 ]},
 {h:"H11 — Ongelijkheid",p:[
   "<b>Sociale ongelijkheid</b> = verschil in <b>waardering</b> tussen (groepen) mensen — niet zomaar verscheidenheid; uit zich soms als klassensysteem.",
   "<b>Armoede meten</b>: budget-/korfmethode, deprivatiemethode, relatieve methode (% van mediaaninkomen), subjectieve methode, wettelijk minimum.",
   "<b>Esping-Andersen — welvaartsstaattypes</b>: liberaal, corporatistisch, sociaaldemocratisch."
 ]},
 {h:"H12 — Macht en stratificatie",p:[
   "<b>Foucault — macht</b>: vooral de macht om een <b>definitie van de werkelijkheid</b> door anderen te laten aanvaarden, niet enkel belonen/straffen.",
   "<b>Scheiding der machten</b> verhindert <b>ongeoorloofde transformatie van macht</b>: cliëntelisme, corruptie, omkoping.",
   "<b>Prestige</b> = het bezit van sociale en politieke macht."
 ]},
 {h:"H13 — Macht en de architectuur van de samenleving",p:[
   "<b>Totale instelling (Goffman)</b>: via <b>initiatierituelen</b> wordt een nieuw lid symbolisch 'vernietigd' en losgemaakt van zijn vroegere identiteit.",
   "<b>Motivatie via overtuigingen</b>: een organisatie die leden bindt via hun overtuigingen kan moeilijk van doel veranderen of leden afdanken."
 ]},
 {h:"H14 — De aanloop tot modernisering",p:[
   "<b>Gemeinschaft vs Gesellschaft (Tönnies)</b>: gemeenschap/geborgenheid tegenover rationeel/zakelijk.",
   "<b>Gemeenschapsverzuchting</b>: nostalgie naar gemeenschap als reactie op modernisering; verklaard door <b>differentiatietheorie</b> (gezin en productie groeien uiteen).",
   "<b>Culturalisten vs dependistas</b> (onderontwikkeling): endogene factoren (cultuur, ligging) tegenover ongelijke relaties tussen landen ((neo)kolonialisme)."
 ]},
 {h:"H15 — De transformatie (modernisering)",p:[
   "<b>Differentiatie van gezin en productie</b>: het vaderlijk gezag regelt de economie niet meer; de zoon neemt het beroep niet automatisch over → gevoel van overbodigheid.",
   "<b>Sacralisering van het kind (Zelizer)</b>: in het emotionelere gezin wordt het kind 'heilig'/onbetaalbaar.",
   "<b>Ziekte & moraliteit</b>: ziekte kan een morele betekenis krijgen; ziekte, zonde en misdaad werden niet altijd duidelijk gescheiden."
 ]},
 {h:"H16 — De transformatie van interactiekaders",p:[
   "<b>Breuklijnen (cleavages)</b>: langdurige tegenstellingen die de politiek bepalen (bv. taalstrijd) en de definitie van de gemeenschap raken.",
   "<b>Verzuiling</b> = sociologisch <b>gesegmenteerd pluralisme</b>.",
   "<b>Verschuiving</b> van primaire naar secundaire interactiekaders door schaalvergroting en differentiatie."
 ]},
 {h:"🔑 Sleuteldenkers (kort)",p:[
   "<b>Durkheim</b> — sociale feiten, collectivistische visie, relatieve autonomie van het sociale.",
   "<b>Weber</b> — bureaucratie, gezag, Verstehen.",
   "<b>Merton</b> — Mattheus-effect, ritualisme, self-fulfilling prophecy.",
   "<b>Goffman</b> — dramaturgie, impression management, roldistantie, totale instelling.",
   "<b>Foucault</b> — macht als definitie van de werkelijkheid.",
   "<b>Bourdieu</b> — habitus, smaak & sociale positie.",
   "<b>Tönnies</b> — Gemeinschaft/Gesellschaft. &nbsp; <b>Mauss</b> — de gift & reciprociteit. &nbsp; <b>Olson</b> — collectieve actie & free-rider.",
   "<b>Esping-Andersen</b> — types welvaartsstaat. &nbsp; <b>Zelizer</b> — sacralisering van het kind. &nbsp; <b>Michels</b> — ijzeren wet van de oligarchie."
 ]}
];
var SOCIO_EN=[{"q":"Which 'legitimizing narrative' surfaces in Marx's theory when he discusses the evolution towards a classless society?","o":["Cohesion","Division of labour","Conflict","Order","Empirical evidence","Collective action","History","Justice","Unequal labour relations","Self-fulfilling prophecy"],"note":null},{"q":"In what way do the positions of Luhmann and Habermas differ with respect to the arbitrary? Select the two INCORRECT answers.","o":["Habermas believes that through open and reasonable communication, choices can be made that resolve the arbitrary.","Habermas opposes the ideas of the Enlightenment and sees no value in reasonable solutions; institutions such as religion and tradition are better placed.","Luhmann is a committed Enlightenment thinker; science is the only true method for knowing with certainty what the truth is.","According to Luhmann, we must learn to live with the arbitrary; a consensus is, after all, impossible.","According to Habermas, science cannot tell us what we should pursue, but only how we can achieve predetermined goals."],"note":null},{"q":"What insights and contributions did Comte make to the emergence and development of sociology as a science?","o":["That prejudices and interests obscure a realistic and sober view of social phenomena.","That sociology should concern itself with searching for regularities in human action and should not raise metaphysical questions about the origin of humankind.","That sociologists must maintain a certain detachment with respect to their object of study.","The idea that the social is of natural origin.","A positivist approach to social reality: a matter-of-fact way of studying society grounded in scientific observation and logic."],"note":null},{"q":"An important sociological lesson is that everything is contingent but not therefore arbitrary. Which two statements are consistent with that lesson?","o":["Our institutions could also have taken on a completely different form.","There is no good reason for the form that institutions have taken on in our society.","Something is neither necessary nor impossible.","Society and history are completely controllable.","Laws, regulations and customs rest on natural laws."],"note":null},{"q":"What do sociologists mean when they speak of '(the problem of) order'?","o":["The preservation of the possibility of arriving at rules that are observed.","The preservation of the existing power relations, laws, customs, expectations, and so on.","The awareness that, when crime is too high, living together becomes greatly hindered.","The whole of rules, expectations, norms, and so on, that give life a certain predictability and calculability.","The awareness that, over time, customs, institutions and laws are variable."],"note":null},{"q":"On what basis do societies (which realize that their organization is contingent) legitimize their laws, customs and institutions? Select the two INCORRECT answers.","o":["History","Nature","Cohesion","Conflict","Material necessity"],"note":null},{"q":"Alcoholic beverages are legally consumed, sold and stored in Belgium, but this is not the case in all countries. This is an example of…","o":["An extreme fanaticism.","The arbitrary nature of rules of conduct.","A conflict of values.","Law as construction and convention.","The contingent nature of social rules."],"note":null},{"q":"For Durkheim, religion was a phenomenon ('fact') that had to be explained in an empirical-analytical way. What conclusions can we draw about the way in which Durkheim studies religion?","o":["That faith and ritual are merely errors, unscientific notions and barbaric practices.","That claims from religious sources must be regarded as truths by sociologists.","That Durkheim's stance reflects a sociological respect for the equal standing of phenomena.","That, according to Durkheim, religion has little meaning, both for believers and for those who seek meaning in another way.","That religion cannot be used to explain behaviour; it is a fact that stands apart from society.","That, according to Durkheim, institutions that are widespread and enduring cannot be dismissed as resting on a lie or an error.","That a sociologist should study only the general religious precepts.","That, according to Durkheim, religion, like all social phenomena, has a rational basis.","Durkheim's stance shows that he adheres to symbolic interactionism.","That religions will always continue to exist because it is inherent in human nature."],"note":null},{"q":"One can regard Marx and Freud as sources of inspiration for critical sociology because they…","o":["…disagreed with the existing organization of society and wanted to change it.","…were opposed to the existing, ruling classes.","…were involved in revolutionary movements.","…held the view that behind the apparent reality lies a deeper, more meaningful reality.","…believed that knowledge can lead to the liberation and emancipation of people."],"note":null},{"q":"According to Durkheim, respect for the object of study means…","o":["That all social behaviours are of equal standing.","That one can only understand the behaviour of people of one's own culture.","That for every kind of behaviour one must seek an explanation.","That people's behaviour always rests on scientifically correct grounds.","That one must not immediately attribute behaviour to an error."],"note":null},{"q":"Which rules or principles underpin the giving of gifts (Marcel Mauss)?","o":["Functionality","Proportionality","Normativity","Reciprocity","Wealth"],"note":"Possible textbook error: 'proportionality' is not a classic Maussian principle (the core = reciprocity). Check against the course material."},{"q":"Below are statements about the tasks of the sociologist. Which two are INCORRECT?","o":["Critical sociology cannot accept the existing values and convictions.","Through insight into the functioning of society, the critical sociologist wants to bring to light its self-made yet hidden limitations.","The aim of empirical-analytical knowledge is to break through the existing constellations of interests in society.","Practical sociology wants, through insight, to let us also take pleasure in the perception of social reality.","Unveiling the reality that usually remains hidden is the most important aim of sociology."],"note":null},{"q":"Beck and Giddens argue that a process of individualization is taking place. What do they mean by this?","o":["People no longer have any regard for the problems of others and act increasingly out of pure self-interest.","Young people increasingly shape their own life course and decide for themselves what/when they study, whom they marry, where they live, and so on.","More and more people believe that they may defend their property with weapons.","Characteristics such as social class or sex offer little to no predictive power for the views or tastes of individuals.","People increasingly inform themselves less from experts and increasingly make choices in an intuitive, almost instinctive way."],"note":null},{"q":"What is meant by the 'empirical disposition' of the sociologist?","o":["That the sociologist must not become entangled with the ideas, prejudices and passions of the people/groups he studies.","That the sociologist must always assume that people act rationally and out of self-interest.","That the sociologist must always be willing to test his own views, without prejudice, against his observations and those of others.","That the sociologist must always keep to the margins of society and may not hold any view of his own.","That the sociologist must not be tempted into abstract notions about the 'true' essence of humankind without testing these against empirical reality."],"note":null},{"q":"An announced train strike led forecasts to predict unprecedented traffic congestion; many people adjusted their behavior and the congestion failed to materialize. This is a good example of…","o":["a misguided use of functional analysis.","a self-fulfilling prophecy.","a Matthew effect.","a Gropius curve.","a Popper effect.","the perverse effects of rational social action.","the problems with extrapolations from statistical analyses that fail to take intentional behavior into account.","a self-defeating prophecy.","an unintended consequence of the possibility of teleworking.","an incorrect definition of the situation by the traffic experts."],"note":null},{"q":"By the problem of collective action (Olson) we mean:","o":["the fact that, unless collective goods are converted into individual rewards or punishments, a rationally acting individual will not commit to acquiring those goods.","the problems caused by demonstrations and protest actions.","the difficulties in coordinating the action of different people.","the problem that political movements are always led by those who have the most time.","the fact that individuals who act rationally and in their own self-interest will, in a large group, not commit to pursuing collective interests."],"note":null},{"q":"What is the Matthew effect?","o":["With the Matthew effect, Merton pointed to the cumulative character of scientific recognition: renowned scientists receive more attention and resources for their research.","It holds that well-off people, provided they act rationally, manage their money more intelligently and carefully than the less well-off.","It demonstrates that individually reasonable behavior always leads to reasonable outcomes.","It points to the unintended redistributive influence of much social policy ('from those who have little, will be taken').","The Matthew effect is an example of an unintended, sometimes even perverse, effect."],"note":null},{"q":"Which statements belong more with Rational Choice theory than with Durkheim's views on the social?","o":["What individuals do appears as a consequence of rules, roles and expectations; the social resides in such expectations.","The distinctive nature of the social is demonstrated by the relative autonomy of the social with respect to other levels of reality.","The social is an unintended, often undesired consequence of the fact that different individuals act rationally and self-interestedly at the same time.","It is the development of the social self that leads people to act deliberately and rationally out of self-interest.","The distinctive nature of the social can be demonstrated by the existence of effects that escape individual intentions."],"note":"The second key ('effects that escape individual intentions') seems to belong rather to Durkheim — check against the course material."},{"q":"If people have a common interest that can be addressed through legislation, then according to Olson's theory of collective action they will…","o":["Set up associations to pursue that interest.","Resist associations that pursue that interest.","Not join organizations that pursue that interest of their own accord.","Join such actions only under pressure.","Serve the interests of others."],"note":null},{"q":"Which elements do we find among the thinkers of the Enlightenment? Select the two INCORRECT answers.","o":["The importance of the individual.","The belief in universal reason and morality.","The belief that views which conflict with reason can be attributed to tradition.","The principle of the equality of all cultures.","The view that people pursue not self-interest but reasonable interest."],"note":null},{"q":"Only two of the statements below are correct. Which ones?","o":["Perverse effects are unnatural.","All perverse effects are unintended effects.","All unintended effects are perverse effects.","A self-fulfilling prophecy is an example of an unintended effect.","The Matthew effect is a form of self-fulfilling prophecy."],"note":null},{"q":"Problematic actions are increasingly seen as inadequacies for which one is not responsible and which are treated through doctors/medical technology. How would you describe this development most precisely?","o":["Increase in professionalization","Growing tolerance","Medicalization","Increase in the authority of physicians","Growing incompetence of medical science","Expansion of the medical sector","The consequence of etiologies other than organic ones","The responsibilization of the sick","'Blaming the victim'","An unintended consequence of the differentiation of the sick role"],"note":null},{"q":"Which two views of 'social reality' color the search for the object of sociology?","o":["The social is a derivative of nature.","The social is a group phenomenon.","The social results from individual action-in-the-plural and its unintended consequences.","The social differs from the natural.","The social is contingent."],"note":null},{"q":"Durkheim opposes rational choice theories. Which arguments does he put forward to do so?","o":["He holds that being an individual differs from society to society, from culture to culture.","He accepts the theoretical premise that a priori distinguishes between individual and society.","He holds that people never act out of self-interest.","He holds that individual behavior can only be understood from the material conditions to which action is bound.","He holds that society is more than the sum of individuals and therefore cannot be understood as an (undesired) by-product of individual action."],"note":null},{"q":"Which arguments do the opponents of rational choice theories use?","o":["It is merely an assumption that people invariably act out of self-interest.","The defenders of rational choice theory have an eye only for the social context within which preferences come about.","Its adherents deny that collective action can come about through coercion or violence.","Rational choice theories are oriented toward a status quo of the existing power relations.","Its adherents do not ask where people's preferences come from."],"note":null},{"q":"The example of the 'sick role' makes clear that…","o":["…roles and behavioral expectations are often more fundamental than individual interests and preferences.","…social phenomena are ultimately also reducible to objective, natural phenomena.","…behavioral expectations can ultimately also be regarded as unintended consequences of intentional actions.","…individual interests and preferences underlie roles and behavioral expectations.","…the social is more than an unintended consequence of intentional actions."],"note":null},{"q":"The difference between the phenomena of illness and the sick role becomes apparent, among other things, from the fact that:","o":["health can be described as a state of complete physical well-being.","considerable reactions have already arisen against the expansion of the sick role.","the contemporary sick role cannot adequately give meaning to the phenomena of 'suffering' and 'death'.","the expansion of the sick role cannot be attributed to developments in medical science.","the use of the sick role cannot be reduced to knowledge of nature."],"note":null},{"q":"Which characteristics or insights did Parsons link to the sick role?","o":["Someone who has been assigned the sick role must make clear to those around them, through outward signs, that he/she is genuinely ill.","A person who has been assigned the sick role does not have to function normally; the sick role is a 'social' translation of the objective conditions of the body.","The sick person is not punished for their incapacity, but must nonetheless show a will to recover.","Only certified physicians can assign the sick role in our society.","When the sick role is assigned, the expectation that this person should behave 'normally' lapses; he/she does not have to meet the usual behavioral expectations."],"note":null},{"q":"By 'internalized' rules we mean the rules that:","o":["have become, as it were, 'second nature'.","have become part of the group or organization.","a culture has made its own.","one cannot break without being committed to a psychiatric institution.","were first formulated in etiquette books and then became self-evident.","one learns when committed to a psychiatric institution.","form the script for smoothly playing out our roles.","establish the internal structure of organizations.","one can easily break."],"note":null},{"q":"What is meant by role distance?","o":["When we play roles, we often identify with the other people in the interaction (e.g. the teacher who identifies with the student).","Role distance occurs when someone plays a role that he/she actually cannot or may not play (e.g. the doorman who plays professor).","Role distance occurs when people take off their 'masks' and step out of their roles, or in Goffman's terms: when one is 'backstage'.","Role distance is a concept from dramaturgical role theory; it refers to situations in which a role is deliberately played ('impression management') without the real 'self' being involved.","Role distance occurs when the expectations associated with a particular role are no longer met."],"note":"Note (possible textbook error): the 1st highlighted answer actually describes role IDENTIFICATION, not role distance. According to Goffman, only 'taking off masks / backstage' is correct. Check with the course material."},{"q":"How do Goffman's dramaturgical approach and symbolic interactionism (Mead) relate to each other?","o":["According to Goffman, complete role distance is not possible, whereas role behavior is.","Both Mead and Goffman view social reality from the perspective of the actor and the roles he/she plays.","According to Mead, the dramaturgical approach is too individualistic: in his view, individuals exist thanks to the roles they play.","Goffman argues that individuals acquire self-awareness through knowledge of different roles.","Both Mead and Goffman employ a rational-utilitarian view of humanity."],"note":null},{"q":"What differences can we distinguish between conflict sociology and functionalist sociology? (variant)","o":["According to conflict sociologists, functionalists too often make use of cohesion as a legitimating narrative.","Conflict sociologists generally pay more attention to the role of coercion in directing human behavior than functionalists do.","Functionalists will, more than conflict sociologists, pay a great deal of attention to social inequality.","Functionalists are more inclined to seek the explanation of human behavior in the socialization and internalization of beliefs and attitudes.","Conflict sociologists pay no attention to the importance of roles in society."],"note":null},{"q":"What is a 'social role'?","o":["The set of norms and rules that people do know how to use, yet cannot explicitly formulate.","A mechanism that gives the behavior of others a degree of predictability.","The set of expectations toward someone in a particular, recurring situation.","The set of internalized behavioral expectations that determine how ego must respond to alter in contacts between foreign cultures.","Social life can be regarded as an already-written play in which everyone plays the role assigned to him/her."],"note":null},{"q":"What differences can we distinguish between conflict sociology and functionalist sociology?","o":["According to functionalists, conflict sociologists make too much use of cohesion as a legitimating third.","Conflict sociologists generally pay more attention to the role of coercion in directing human behavior than functionalists do.","Functionalists will, more than contemporary conflict sociologists, pay attention to social inequality.","Functionalists are more inclined to seek the explanation of human behavior in the socialization and internalization of beliefs and attitudes.","Conflict sociologists pay no attention to the importance of roles in society."],"note":null},{"q":"What criticisms are leveled at functionalist theories?","o":["That in some of these theories it is assumed that phenomena which have a clear function for society will indeed occur.","That these theories overly emphasize the individualistic micro-perspective, at the expense of a comprehensive macro-analysis.","That these theories pay too much attention to the role of conflict and coercion.","That these theories say nothing about the why of individual preferences.","That in these theories cohesion is too often invoked as a legitimating third, thereby defending a status quo of the existing order."],"note":null},{"q":"What is the name of the study that not only measures regularities in human action, but also situates/explains them in light of the interpretations, beliefs and expectations of those involved?","o":["Self-work","Value-committed","Hermeneutics","Kinship studies","Fieldwork","Voluntarism","Functional analysis","Confucianism","Eugenics","Introspective"],"note":null},{"q":"What criticisms does Wilhelm Dilthey's hermeneutic approach make of Max Weber's 'interpretive (Verstehen) method'?","o":["Weber's approach is too collectivistic because of its emphasis on the determined nature of action.","Weber models his approach too closely on the natural sciences.","The interpretive (Verstehen) method does not take into account the motives people have for performing certain actions.","Weber assumes too much that all individuals react in the same way in social situations.","Dilthey, unlike Weber, draws attention to the importance of cultural differences in understanding actions."],"note":null},{"q":"The situational aspects of action comprise:","o":["a definition of the situation.","symbols through which the action can be represented.","the means available to the actor.","the conditions to which the actor is subject.","the ends at which the action is directed."],"note":null},{"q":"Which of the following statements about social action are correct?","o":["Symbols and their meanings are communicative aspects of action.","A hermeneutic approach will primarily formulate the knowing and understanding of the intentional aspects (ends, norms) as a scientific problem.","Adherents of Utilitarianism hold that the intentional aspects of action are the same in all cultures.","The definition of the situation provides an inventory of means and conditions.","The knowledge that underpins the means-ends relations is universal and objective."],"note":"Second key (Utilitarianism: intentional aspects the same in all cultures) — check with the course material."},{"q":"Select the two INCORRECT statements about Utilitarianism.","o":["Utilitarianism considers the cultural components end and norm unimportant.","Utilitarianism makes a distinction between universal ends and natural ends.","According to Utilitarianism, honesty, justice and truth are natural ends.","Utilitarianism assumes that there are a number of naturally given ends.","According to Utilitarianism, the human being pursues his ends as rationally as possible."],"note":null},{"q":"What objections can be formulated regarding Weber's interpretive (Verstehen) method?","o":["Its adherents focus excessively on causality in their study of social reality.","This method offers few possibilities for testing the researcher's interpretation; it remains very subjective.","It is not sufficient to observe statistical regularities.","This method works better close to home and for one's own group than for groups or cultures that are geographically or temporally far removed.","This method loses sight of the practical task of the sociologist."],"note":null},{"q":"What does Luhmann mean when he says: 'Norms are expectations that do not learn.'?","o":["If normative expectations are not complied with, sanctioning action is taken.","Frustrating cognitive expectations provokes intense reactions of aversion or disgust.","Cognitive expectations are adjusted or changed over time when they are not complied with.","Normative expectations do not adapt but become cognitive in nature over time.","Normative expectations rest solely on discursive knowledge."],"note":null},{"q":"Social rules and meanings that we know and use unconsciously (e.g. not staring too long in the lift, not slurping). What do sociologists call this?","o":["Role expectations","Discursive knowledge","Internalization","Elementary knowledge","Socialization","Normative knowledge","Symbolic knowledge","Practical knowledge","Interactional knowledge","Ethnomethodological knowledge"],"note":null},{"q":"Which two statements about sanctioning are correct?","o":["Influencing presupposes solidarity.","When value-commitment is activated, the bond will be confirmed.","Money is the symbolic medium for punishing.","Feelings of guilt are the result of influencing.","With positive sanctions, the promise is carried out when the expectation is fulfilled."],"note":"Second key (feelings of guilt belong, according to the scheme, to value-commitment, not influencing) — check against the course material."},{"q":"Why, according to Boden and Molotch, can technological innovations (video conferencing, e-mail) not fully replace face-to-face interaction?","o":["Face-to-face contact offers more information transfer, including through non-verbal channels.","Face-to-face contacts allow one to test the other's intentions 'frontstage' against his/her behaviour when he/she goes 'backstage'.","Face-to-face contact makes 'interactional vandalism' impossible.","Face-to-face contact offers the possibility of anticipating more quickly when there are disruptions in communication.","Face-to-face contact is more intrusive because it allows one to enter the other's personal space."],"note":null},{"q":"Which statement about knowledge and socialization is correct?","o":["Socialization can only partly consist of education because the knowledge acquired through it is largely practical rather than discursive.","The knowledge of codes of conduct that prescribe how people should behave is what we call practical knowledge.","The knowledge that rests on the regularities that occur in life is what we call discursive knowledge.","Normative expectations are quickly turned into behavioural regularities, in other words cognitive expectations.","People change their cognitive expectations when these are not complied with."],"note":"Textbook: only one correct answer is indicated."},{"q":"What are the central premises of the 'blueprint theory' of social order?","o":["Most people know and respect the rules of social life; in this way a large degree of predictability arises in society.","Discursive rules need to be converted into practical rules in order to increase the understanding of everyday life.","It is virtually impossible to put into words all the practical meanings, rules and norms of everyday social life.","The rules that guide people's behaviour are internalized at a young age and passed on unchanged from generation to generation.","Through observation one can discover the rules that govern social life."],"note":null},{"q":"Ethnomethodology has a specific approach to social reality. Which statements are correct?","o":["Ethnomethodologists try, on the basis of the study of everyday actions and communication, to discover the fundamental rules of living together (a social grammar).","The renewal of roles, norms and conventions is not possible within ethnomethodology given the robustness of the social.","Ethnomethodology has brought to light a number of mechanisms (such as humour, waiting, tact) that ensure that trust in norms and expectations is not entirely damaged by deviation from or frustration of them.","Ethnomethodologists assume that it is possible to convert all practical knowledge into discursive knowledge.","Ethnomethodologists are convinced that the social construction of reality is transparent and easy to uncover."],"note":null},{"q":"'Tact', humour and 'explaining' are mechanisms that…","o":["contribute to making social life bearable.","contribute to limiting the consequences of frustrated expectations.","contribute to absorbing violations of norms without deviance being established.","contribute to social order being disrupted without much difficulty.","contribute to social control being evaded."],"note":null},{"q":"When we want to impose a negative sanction on someone by appealing to convictions:","o":["the condition is solidarity.","we call that punishing.","this sanction can circulate through the symbolic medium of influence.","we activate value-commitment.","the sanctioned person develops feelings of guilt and we confirm his bond.","the condition for the sanctioning is generalized values.","we use influencing as sanctioning.","the result is value-commitment.","we use regular power.","the basis is control over useful means."],"note":null},{"q":"What do sociologists understand by 'social control'?","o":["The set of actions to influence the behaviour of others.","The set of actions that make deviation understandable and acceptable.","The set of actions taken to prevent deviation from or violation of expectations.","The set of sanctioning actions that intervene in the basic needs of humans, namely safety and physical well-being.","The set of actions that make specific prohibitions and commandments superfluous."],"note":null},{"q":"Which two dichotomies are crossed to distinguish the four fundamental types of sanctions?","o":["Cognitive versus emotional sanctions.","Appealing to material circumstances vs. appealing to convictions and feelings.","Primary versus secondary sanctions.","Rewarding versus punishing.","Positive versus negative sanctioning."],"note":"Verification disputes 'cognitive vs emotional' — probably 'positive vs negative'. Check against the course material."},{"q":"Which shift in modes of sanctioning does Foucault identify since the 18th century?","o":["From negative to positive sanctions.","From laws to norms.","From external to internal sanctions.","From punishing to activating value-commitment.","From punishing to rewarding."],"note":null},{"q":"When, in the context of modes of sanctioning, one speaks of 'influencing', this means:","o":["Appealing to values and ideals.","Holding out the prospect of a reward.","Relying on the assumption that one is acting in someone's best interest.","Counting on an agreement of convictions and values."],"note":null},{"q":"The concept of 'discourse' occupies a central place in Foucault's work. What do we understand by it? Select the two INCORRECT answers.","o":["A discourse is a way of speaking that immediately also provides the speaker with views and values.","A discourse is a particular perception of reality that is self-sustaining; by maintaining it one constantly confirms it.","A discourse situates people in a particular reality and thereby influences their feeling and thinking.","A discourse is a combative argument that aims to incite people to action.","A discourse is a reconstruction of a dialogue between historical figures."],"note":null},{"q":"Parsons distinguished four forms of sanctioning, including 'value-commitment'. Which statements correspond to this form?","o":["Amira and Beril are good friends; they can ask each other a favour in the name of their friendship, but then a material reward or threat of punishment is needed.","If Noor is a devout Christian, one can bring her to certain actions by saying that these are a sacred duty for Christians.","If Alex sees himself as a socialist, he feels encouraged to defend the system of social security when the party chairman says that good socialists do so.","As soon as people share values, they can sanction each other's behaviour because they know with which material rewards and punishments they can best influence each other.","Changing one's opinion or conviction is sanctioned because at that moment you are not being true to your values."],"note":null},{"q":"Marx observes how more and more human activities are exchanged for money and traded as commodities. What does Marx call this process?","o":["Fanaticism","Social inequality","Pauperization","Gentrification","Commodification","Capitalism","Greed for money","Globalization","Speculation","Value stimulation"],"note":null},{"q":"Which statements about the symbolization and scaling-up of the modes of sanctioning are correct?","o":["Respect for regular power depends on the belief in its convertibility into an actual punishment.","The value of money lies in its direct possibilities for use.","The scaling-up of the modes of sanctioning precedes their symbolization.","In order to be re-elected, a politician will mainly appeal to the respect we have for regular power.","A decline in trust in symbols leads to a return to more small-scale networks."],"note":null},{"q":"What do we mean by the generalization or symbolization of sanctioning possibilities? Select the two INCORRECT answers.","o":["This means that the sanctions blur and flatten out, so that trust in these sanctions becomes very vulnerable.","This means that the sanctions become recognized and applicable in a greater number of spheres of life.","This means that the sanctioning possibilities become transferable or passable on to others.","This means that the sanctions retain the same meaning under equal circumstances.","This means that the sanctions acquire a very general meaning."],"note":null},{"q":"Which processes does Talcott Parsons identify in connection with the modes of sanctioning?","o":["Symbolization","Activation","Scaling-up","Informalization","Regularization"],"note":null},{"q":"Which two statements about 'money' are correct?","o":["Money is worthless in itself but acquires value through its immediate use value.","In periods of economic recession, money loses its role in conferring social status.","Money is a representation of the promise that someone else will accept it in exchange for intrinsically valuable goods.","Money symbolizes the possibility of being able to punish another person.","The use of money depends on trust in its exchange value."],"note":null},{"q":"…(in connection with) punishment, regular power becomes …","o":["the punishments are rather symbolic (e.g. a fine) than physical.","the punishment no longer depends on persons who can physically carry out the punishment, but on persons who, by virtue of their authority, can perform a series of actions that ultimately lead to a punishment.","there is more threatening than punishing.","the signs indicating that someone can actually carry out the threat of punishment are replaced by symbols.","the mere threat of punishment is sufficient to exercise social control, and the actual carrying out of punishments becomes rare."],"note":null},{"q":"In what sense is the police officer's uniform a 'symbolization' of regular power?","o":["Because in our society the uniform has become a measure of status and order.","Because the uniform represents the power to fine and punish.","Because the uniform has great symbolic significance in our society.","Because by wearing the uniform one can symbolically punish someone.","Because in our society all people recognize the police officer's uniform as a sign of regular power."],"note":null},{"q":"In which theory of crime is criminal behavior explained through the relationship between the criteria for success/expectations in a society and access to the legal means to achieve that success?","o":["Phrenology","Anomie theory","Subculture theory","Social disorganization theory","Broken windows theory","Rational choice theory","New Criminology","Ethnomethodology","Labeling theory","Control theory"],"note":null},{"q":"Which statement about crime is INCORRECT?","o":["According to rational choice theory, someone will commit a crime if the expected benefits outweigh the risk of being caught and punished.","All violations of norms and rules are seen as criminal behavior in society.","Anomie makes it more likely that people will use criminal means to achieve their goals.","Crime is a contingent concept.","Judicial statistics will contain a higher number of offenses than police statistics."],"note":"Book: only one incorrect answer is marked (the question asked for two)."},{"q":"Sociological explanations of crime rest on the following insights. Select the two INCORRECT answers.","o":["A criminal personality cannot be identified on the basis of external, morphological features, but it can on the basis of deeper-lying, genetic characteristics.","Crime is encouraged by certain subcultures.","Crime is not a characteristic of the biological organism, but of the personality.","Crime is encouraged by a discrepancy between the goals that people believe they must achieve and the legal means at their disposal.","Crime is a matter of evaluation."],"note":"Second key disputable in verification - check against the course."},{"q":"If certain punishable behaviors (e.g. vandalism, petty crime) become less frequent, is it possible that the crime statistics nevertheless indicate an increase?","o":["No, unless something happens such as a change in the behavior of the police.","No, because we deduce the frequency of criminal behavior from the crime statistics.","No, because the statistics record the sum of actual behavior and reporting behavior.","Yes, if the reporting behavior of citizens changes.","No, since the statistics record the frequency of that behavior."],"note":"The two marked options seem contradictory - check in the course."},{"q":"Conflict sociologists and functionalists explain crime differently. Which elements belong rather to a functionalist approach?","o":["Criminal subculture theory and the way in which individuals acquire status within a group.","Discrimination in the labor market and how this leads to deviant behavior.","The proportionally unequal prosecution of white-collar crime and shoplifting.","The greater efficiency of zero-tolerance policing in the fight against crime.","The connection between the changed attitude toward rape and the greater equality between men and women."],"note":null},{"q":"Which two measures to combat crime would a defender of rational choice theory NOT suggest?","o":["Increasing the likelihood of being caught and increasing the severity of punishments.","Combating poverty.","Investing in community and associational life.","Having more police officers patrol the streets.","Banning gangster films."],"note":null},{"q":"The condom ban of Pope Leo XII (syphilis) and the later plea to allow condoms in the fight against AIDS - viewed sociologically, this shows:","o":["That what we consider deviant behavior has a biological motivation.","That diseases can acquire a moral meaning.","That the concepts of disease, sin and crime are not always clearly separated.","That the discovery of the correct, scientific meaning of syphilis and AIDS is of recent date.","That increased medical knowledge detaches diseases from ethical ideas."],"note":null},{"q":"Which sociological term applies here: pupils who perform less well in class often become trend-setters in the peer group with opposing norms, in order to gain some prestige?","o":["stratification","labeling","Matthew effect","labeling","role distance","symbolic determinism","commodification","self-fulfilling prophecy","status compensation","social disposition"],"note":null},{"q":"What insights did Pierre Bourdieu provide on the relationship between taste patterns/leisure activities and social position?","o":["According to Bourdieu, innovation and creativity, in the absence of financial means, characterize the taste pattern of the lower social classes.","Bourdieu holds that extravagance and ostentation characterize the taste pattern of the elite.","Bourdieu criticizes the idea that it is merely financial means that determine the taste pattern of a social class.","Bourdieu introduces the concept of 'habitus', which was later popularized by Norbert Elias.","By growing up in a particular social milieu, one acquires skills, resources and social contacts that make a specific taste pattern possible and predictable."],"note":null},{"q":"Give the INCORRECT statement regarding class and castes.","o":["Membership of a caste has nothing to do with personal merit.","The caste system, in its classical form, did not entail any judgement of individuals and carried a strong legitimation within itself.","In a society of a class character, the position one occupies on the social ladder is formally determined by birth.","With the transition from caste and estate to a class society, we have become a formally egalitarian but in fact unequal society.","Caste and class are two terms that refer to the same concept."],"note":"Textbook: only one incorrect answer is indicated (the question asked for two)."},{"q":"What do sociologists mean when they speak of an 'egalitarian society'?","o":["Inequality is no longer justified in terms of divine providence or notions about the nature of the cosmos.","The individual is the main party responsible for acquiring his/her strong social position.","The most blatant forms of inequality have disappeared, partly thanks to the welfare state.","That an individual is not at fault when he is less well-off.","That the pursuit of equality is enshrined in the laws."],"note":null},{"q":"In 'The Theory of the Leisure Class', Thorstein Veblen speaks of 'conspicuous consumption'. What does he mean by this?","o":["The leisure pattern of the late-19th-century American elite.","The injudicious use of available means in filling one's leisure time.","Compensating for a low social position through excessively large expenditures on luxury products.","The breaking through of class-bound taste patterns.","The extravagant, ostentatious expenditure of property and wealth in order to assume status."],"note":null},{"q":"What insights did Veblen provide with 'The Theory of the Leisure Class'?","o":["That a higher social position always expresses itself in 'conspicuous consumption'.","That a social position expresses itself symbolically in the form of a specific taste pattern.","That in every society the elite wants to distinguish itself from the lower social classes through, among other things, its taste pattern.","That a person's leisure activities can offer compensation or an outlet for his/her weaker social position.","That one needs not only money but also knowledge and skills to assume a particular status through taste and consumption."],"note":null},{"q":"Which two mechanisms lie behind labeling theory?","o":["People who know a person's bad reputation are quicker to interpret his/her behaviour as deviant.","Over time the labeled person internalizes the negative image that others have of him/her.","Persons in a socially weak position seek compensation by 'smearing' well-off individuals.","Assigning a 'label' to persons who acted deviantly reduces the chance that they will reoffend.","The status-compensating behaviour of persons from a low social class is more quickly given a negative interpretation."],"note":null},{"q":"Which form of power expresses itself through rewarding with scarce and coveted goods or services?","o":["Intellectual power","Constitutional power","Political power","Cultural power","Sanctioning power","Regularized power","Economic power","Social power","Legislative power","Physical power"],"note":null},{"q":"Duncan and Blau developed a basic model of status attainment. Which statements about educational level and occupational status hold true for the Flemish and Dutch context?","o":["Besides the parents' educational level, their cultural practices (such as media preference) also influence the child's educational level.","The influence of the father's occupational status on the child's educational level has increased.","The influence of the acquired diploma on one's own career has become much greater over time.","Neither the educational level nor the occupational status of the father has lost influence on the child's educational level.","The father's occupational status has a greater influence on the child's educational level than the father's educational level does."],"note":null},{"q":"Which claims do Herrnstein and Murray defend in their book 'The Bell Curve'?","o":["The share of persons with a high IQ in the lower social classes will increase.","Democratizing the education system will drastically raise the average IQ and break through the normal distribution.","People tend to marry a social equal, i.e. homogamy.","A society that pursues an open education system and an efficient organization will gradually give more power to people with a high IQ.","A person's IQ is not biologically but socially heritable."],"note":null},{"q":"Which three principles of stratification does Max Weber distinguish? Select the two INCORRECT answers. (correct = class, estate, party)","o":["Class","Estate","Party","Caste","Occupational group"],"note":null},{"q":"Which principles and ideas belong to the term 'meritocracy' as described by Michael Young?","o":["Upward social mobility is exclusively a result of effort and achievement.","Talent and intelligence are equally distributed across the various social classes.","Educational opportunities are offered on the basis of talent and intelligence.","Social mobility is unpredictable.","The low-skilled and people in socially weak positions have had bad luck."],"note":null},{"q":"What was Max Weber referring to with the distinction between 'a class in itself' and 'a class for itself'?","o":["The fact that people share a number of economic living conditions does not mean they will therefore necessarily unite or organize politically.","With this pair of concepts Weber refers to the process by which fellow members of the same social class become aware of one another.","With this pair of concepts Weber makes clear that the Spirit of Capitalism must penetrate the consciousness of the working class.","It is not the shared taste patterns but the shared experience of equal economic conditions that matter for group formation.","A 'class for itself' groups together people with an equal economic situation; we speak of a 'class in itself' when these people are also aware of their shared fate."],"note":null},{"q":"Which two tendencies regarding stratification and inequality apply in our present-day society?","o":["For people's life chances, their cultural capital is increasingly of decisive importance.","The low-skilled run a high risk of exclusion, which is moreover quickly regarded as the result of a lack of personal effort or merit.","Poverty and exclusion remain, even for the low-skilled, to a large extent an unpredictable misfortune.","Research shows that social positions are increasingly ascribed and ever less achieved.","The influence of the father's occupational status on the child's educational level (and thus life chances) has increased over recent decades."],"note":null},{"q":"What term do social scientists use to refer to the existence of pillarization?","o":["Ideological concentration","Socio-cultural enclosure","Cultural pluralism","Ideological pillar formation","Segmented pluralism","Value concentration","Socio-cultural stratification","Subcultural solidarism","Socio-cultural decommodification","Socio-cultural labeling"],"note":null},{"q":"Which statements about Marshall's essay 'Citizenship and Social Class' are correct?","o":["According to Marshall, basic rights are the precondition for and the gateway to full citizenship.","Marshall notes that migration makes the question of citizenship more complex.","Marshall approaches citizenship as a gift relationship governed by the rules of proportionality and reciprocity.","Contemporary societies guarantee, by linking various kinds of rights to citizenship, a minimum of power for all citizens.","In this essay Marshall does not sufficiently emphasize the idea that rights must be linked to duties."],"note":null},{"q":"The separation of powers seeks to prevent illegitimate transformations of power. Which are examples of such illegitimate transformations?","o":["Clientelism, in which, for example, a party binds voters to itself through personal economic advantages.","Corruption, in which, for example, an official uses his regular power to enrich himself personally.","A strike, in which workers halt activities in order to influence employers' decisions.","Sponsorship, in which companies finance sports clubs in exchange for advertising.","Promotion, in which an employee takes up a higher position in the hierarchy and gains greater prestige."],"note":null},{"q":"What criticisms do the proponents of a pluralist view of power level against the theory of the ruling class?","o":["Pluralists point to the heterogeneous composition of the elite and to the conflicts of interest within the group of the powerful.","The proponents of a multidimensional perspective argue for a far-reaching convertibility of the various forms of power.","According to the pluralists, the members of the elite are interconnected through networks and meeting places.","As a result of the commercialization of art and culture, these have lost their socially critical function.","The proponents of the multidimensional view of power hold that different forms of power can be used against one another."],"note":null},{"q":"Esping-Andersen constructed a typology of welfare states. Which two forms of developed welfare states does he distinguish?","o":["Neo-corporatist type.","Social-democratic type.","Conservative-corporatist type.","Liberal type.","Rhineland type."],"note":null},{"q":"Which statements are found in Alexis de Tocqueville's book 'De la démocratie en Amérique'?","o":["Citizens are not clients of the government or the state, but should be full members of the community.","Democracy in Europe is more developed than in America.","In addition to social, political and civil rights, a society should also provide cultural rights.","Social and political participation are of great importance to keep democracy from degenerating into a totalitarian regime.","Individual freedom is subordinate to the government and the community."],"note":null},{"q":"According to Lipset and Rokkan, we must understand present-day society as the product of a series of conflictual transformations. Which two societal developments do they consider crucial for the current cleavages?","o":["Modern state formation","Reformation","Expansion of education","Post-war welfare state","Industrial revolution"],"note":null},{"q":"Within modernization theory, the 'rationalization of the image of humanity and society' is understood to mean the following:","o":["The rise and flourishing of Protestantism.","The growth of effective, bureaucratized states.","The expansion of capitalism.","The scaling-up of trade.","The growth of confidence in the knowability of reality on the basis of empirical-rational knowledge.","Technological progress.","The decline of faith.","The emergence of effective cooperation between scientists and craftsmen.","The spectacular growth of the educational system.","The growth of individual freedom of choice by rational individuals."],"note":null},{"q":"Which statements did Robert Malthus defend in 'Essay on the Principle of Population'?","o":["People reproduce so unchecked that famine and poverty are inevitable.","Malthus counted on the inventiveness and adaptability of people to overcome the disastrous consequences of overpopulation.","The government should take fertility-curbing measures in a repressive manner.","An increase in prosperity and an efficient social policy lead to a decline in fertility.","Birth control is not only harmful to morality but would moreover be followed only within the 'better' strata of the population."],"note":null},{"q":"An important debate in sociology concerns that between idealists and materialists. Which statements are correct?","o":["Materialists hold that changes in values are induced by variations or changes in conditions and situation.","In his study of the rise of capitalism, Max Weber attempts to reconcile idealist and materialist positions.","According to Weber, just as according to Marx, art, ideas and convictions are consequences of the existing power relations.","According to the idealists, science and technology are the driving forces behind change.","Max Weber can be regarded as a materialist."],"note":null},{"q":"Why, according to Weber, could the 'spirit of capitalism' foster economic success?","o":["The spirit of capitalism made obtaining credit easier, as Benjamin Franklin observed.","The spirit of capitalism stimulated the pursuit of self-interest.","The spirit of capitalism was able to emancipate itself from its religious origin and thereby stimulated capitalism.","The spirit of capitalism justified the making of money.","The spirit of capitalism prompted a frugal life and thus increased the likelihood of saving and investing."],"note":null},{"q":"Which fundamental features of the Protestant ethic contributed, according to Weber, to the spread of the spirit of capitalism?","o":["Within the Protestant ethic, work became an important religious duty.","The Puritan sects strongly defended the growth of capitalism.","The Protestant ethic fostered a flexible attitude that promoted capitalism.","Within the Protestant faith, worldly and religious matters were strictly separated from each other.","The pursuit of success in one's occupation was an outward sign of being among the elect."],"note":null},{"q":"For Weber, the 'spirit of capitalism' is… Select the two INCORRECT answers.","o":["characterized by a strong emphasis on thrift.","characterized by a linking of usefulness to money.","clearly to be found in the writings of Benjamin Franklin.","a cause of the Protestant ethic.","a necessary and sufficient condition for the growth of capitalism."],"note":null},{"q":"According to Weber, the connection between Protestantism and capitalist success is a consequence of religious developments that cannot be reduced to material causes. Which developments did Weber have in mind?","o":["The excessive pursuit of profit by the Protestants.","The fact that Protestants were more inclined to live like Renaissance people and thus developed their talents better.","The Counter-Reformation.","The doctrine of the signs of grace (the doctrine of predestination).","The importance attached to asceticism in the world."],"note":null},{"q":"According to Barrington Moore's view of modernization, what promotes the development of a parliamentary democracy?","o":["The presence of an economically and politically strong bourgeoisie.","A strongly centralized state, but a weakly developed bourgeoisie.","When large landowners are the initiators of the modernization process.","The presence of a moderately developed bourgeoisie.","The presence of an economically and politically weak bourgeoisie.","When the initiative for modernization lies with the traditional elite surrounding a royal house.","Fascist regimes result from a delayed and incomplete modernization process.","When the peasant population is organized in traditional, non-commercial village communities.","Having several colonies (dependency theory).","Having an entrepreneurial culture that expresses itself in the 'Spirit of Capitalism'."],"note":null},{"q":"Which two statements about the modernization process are INCORRECT? (During the modernization process...)","o":["the importance of international trade has increased.","the family as the basic unit of society has disappeared.","the role of scientific research relative to agriculture has become more important.","the average life expectancy has increased.","the degree of political centralization has decreased."],"note":"According to the source, 'international trade has increased' is marked incorrect, but sociologically this is actually a true trend - possibly an error in the textbook. Check against the course materials."},{"q":"Which thesis do the proponents of dependency and world-systems theories defend?","o":["The underdevelopment of Latin American countries is due to the unequal relations between these countries and the more developed countries.","Economic dependence manifests itself, among other things, in the obligation to specialize in the production of specific goods.","Within the world system, the dependistas distinguish three spheres: core, periphery, and multinational corporations.","The lack of internal dynamism in the developing countries is responsible for their disadvantaged position.","An increase in prosperity in developing countries depends on their democratization process."],"note":"Textbook: only one answer is marked correct (the question asked for two)."},{"q":"If we compare modernization processes across various countries, what findings does this comparative study arrive at?","o":["That, depending on the moment at which the modernization process begins to take shape, the patterns of modernity can vary greatly.","That modernization is always the work of a 'new' class, in this case the new elite.","That modernization leads to convergence.","That the power relations in the modernization process remain essentially intact.","That different patterns of modernity can take shape within the modernization process."],"note":null},{"q":"According to Barrington Moore, the likelihood of a left-wing dictatorship (communism) increases when:","o":["a country lies in the Eastern Bloc.","a country belongs to the first wave of modernizers.","the bourgeoisie in a country is economically and/or politically weak.","land ownership in a country is not concentrated.","land ownership in a country is concentrated."],"note":"Moore's theory: the second answer is theoretically debatable - check against the course materials."},{"q":"In the run-up to modernization, the ideas of the Puritans and the Enlightenment thinkers gained ground. What common characteristics did they share?","o":["The belief in personal knowledge and responsibility.","The belief in a savior who will come and reveal the meaning of life.","Having thought about God and humankind imposed by ecclesiastical authority.","Reverting to conventional ways of thinking and doing.","The belief in the transformability of natural and social reality."],"note":null},{"q":"Which statements describe the neoclassical or neoliberal theory (about why some countries offer more prosperity)?","o":["The neoliberal theory assumes that economic development is more likely if the free movement of goods and capital is stimulated as much as possible.","The neoliberal theory prescribes measures that increase international competition (such as abolishing export subsidies and protectionist measures).","The neoliberal theory emphasizes the role of the state: the engine of development is a robust and dynamic government apparatus.","The neoliberal theory focuses attention on socio-cultural factors; culture determines work techniques and thereby economic development.","The neoliberal theory rests on the concept of freedom and attaches particular value to freedom of thought and action as the engine of prosperity."],"note":null},{"q":"In primary interaction frames... Select the INCORRECT answer.","o":["face-to-face relationships are important.","direct communication is important.","a language of their own is often developed.","the contacts are intimate.","various goals can be pursued.","the relationships are particularistic.","the relationships are personal.","people feel mutually connected.","the goals are specified.","changes in individual members have a major impact in their consequences."],"note":null},{"q":"Which statements about interaction frames are correct?","o":["Primary interaction frames are characterized by particularistic goals.","Interaction frames change in nature or character when a change in membership occurs.","The traditional or pre-modern family was closer, on the continuum of interaction frames, to the pole of the primary interaction frame than the modern family.","The boundaries of interaction frames lie in the expectations that the members hold toward one another.","Over time, the family increasingly acquired the character of a primary interaction frame."],"note":null},{"q":"Primary groups, formal organizations, and interdependencies are different interaction frames. Which two statements are INCORRECT?","o":["In primary groups, the relationships are still impersonal.","Most enterprises are formal organizations.","In formal organizations, the relationships are more particularistic than in interdependencies.","In interdependencies, people feel strongly connected to one another.","In formal organizations, the goals are more specified than in primary groups."],"note":null},{"q":"Under which basic conditions does a primary interaction frame cease to be 'primary'?","o":["When the members of the interaction frame go to live far apart.","When fundamental changes have taken place in the personality of one or more members.","When individuals in the primary interaction frame stop coming into contact with one another.","When the members only come together to pursue specific goals, but have ceased their personal relationships.","When the emotional bonds within the interaction frame have changed."],"note":null},{"q":"In what respect has the process of structural-functional differentiation changed the meaning of children in our society?","o":["A greater sensitivity to child abuse has emerged.","An increase in child abuse can be observed, especially from the 1990s onward.","The child has become an object of economic calculation.","A growing gap arose between the world of the child and the world of work.","Utilitarian motives in child-rearing have become legitimate."],"note":null},{"q":"Why has the number of divorces increased? Select the two INCORRECT answers.","o":["Marriage became primarily an emotional matter.","Women have greater economic independence relative to the husband and the family.","The new marital morality (cf. the romantic marriage) enables both marriage partners as well as their children to form new families easily and without much conflict.","Fewer and fewer people choose unmarried cohabitation.","Fewer and fewer marriages rest on business considerations."],"note":null},{"q":"Which two statements about structural-functional differentiation are INCORRECT?","o":["We speak of differentiation when the number of functions performed by an interaction frame increases.","Certain developments in parental authority can be regarded as a consequence of differentiation.","The differentiation of the family and the unit of production promotes the romantic marriage.","Divorces are often the result of the differentiation of the marriage partners.","The affective relationship between parents and children is a consequence of the differentiation of work and family."],"note":null}];
var SUMMARY_EN=[{"h":"H1 — The sociological longing","p":["<b>Contingency</b>: institutions and rules are neither necessary nor impossible — they could have been otherwise, <b>but they are not therefore arbitrary</b> (not just random).","<b>Social order</b>: how do societies arrive at shared, observed rules? That is the central question.","<b>Egalitarian society</b>: inequality is no longer justified through divine will; equality is embedded in the laws.","Marx uses 'history' as a legitimizing narrative leading toward a classless society."]},{"h":"H2 — The task and attitude of the sociologist","p":["<b>Research cycle</b>: theory → <b>hypothesis</b> → testing/observing → conclusion (theory possibly revised).","<b>Comte</b>: positivism — searching for regularities, no metaphysical questions.","<b>Critical function</b>: the sociologist positions themselves 'at the margin', relatively independent of dominant interests.","<b>Cultural relativism</b> (radical): cultures cannot be translated into one another; no value judgement is possible.","Transferring knowledge is difficult: insights often run counter to 'common sense' and to group interests."]},{"h":"H3 — Discovery of society I (individualist)","p":["<b>Individualist approach</b>: the social arises as an <b>unintended consequence</b> of rationally acting individuals.","<b>Rational choice / exchange theory</b>: starts from a rational individual who acts out of self-interest.","<b>Matthew effect</b> (Merton): those who already have much get even more (e.g. grants that mainly help the middle class).","<b>Olson — collective action</b>: the <b>free-rider</b> problem; rational individuals do not contribute to a collective good.","<b>Unintended vs perverse effects</b>: the self-fulfilling prophecy versus the self-defeating prediction (the traffic jam that fails to occur)."]},{"h":"H4 — Discovery of society II (collectivist)","p":["<b>Durkheim</b>: roles, norms and expectations underlie preferences; the social has a <b>relative autonomy</b> (more than the sum of individuals).","<b>Normatively acting individual</b>: symbolic interactionism, ethnomethodology and dramaturgy — opposed to the rational individual of H3.","<b>Individual and society 'make each other'</b>: freedom depends on the means to act according to one's preferences."]},{"h":"H5 — Role and self","p":["<b>Social action</b>: intentional aspects (goals, values) + communicative aspects (symbols, meanings).","<b>Definition of the situation</b> (Thomas): the meaning of action depends on how the situation is defined.","<b>Goffman — dramaturgy</b>: impression management; <b>role distance</b> = distancing yourself from your role (the difference between the 'real' and the 'presented' self).","<b>Culture</b>: a transmitted whole of meanings in symbols, through which people communicate and pass on knowledge."]},{"h":"H6 — Expecting and explaining","p":["<b>Primary relationships</b>: affective, intimate, personal, diffuse — they change in nature when a member drops out.","<b>Non-primary relationships</b>: impersonal, aimed at a specific goal, instrumental, indirect communication.","<b>Expectations and roles</b> guide behaviour; in primary relationships the 'silent language' of signs and attitudes is at work."]},{"h":"H7 — Socialization and methods of living together","p":["<b>Socialization</b>: the internalizing of norms, values and roles.","<b>Bourdieu — habitus</b>: growing up in a milieu produces a predictable <b>pattern of taste</b>; taste is not merely a matter of money.","<b>Mauss — the gift</b>: gifts rest on <b>reciprocity</b> (mutual exchange)."]},{"h":"H8 — Social control","p":["<b>Belts of social control</b>: routine, socialization, internalization, informal and formal sanctions, buffers (humour), safety valves (carnival). Self-fulfilment is NOT part of it.","<b>Four forms of power</b>: economic (rewarding), political (coercion/punishment), social (influence), cultural (activating loyalty to values).","<b>Symbolization & scaling-up</b>: <b>money</b> as a symbolic means of sanctioning; respect for power rests on the belief in its convertibility into real punishment."]},{"h":"H9 — Societal scaling-up","p":["<b>Money</b> as a medium: a transferable possibility of sanctioning, a 'written promise'.","<b>Bureaucracy (Weber)</b>: written archive, strong division of labour/authority, clear hierarchy.","<b>Merton — ritualism</b>: the means becomes more important than the goal.","<b>Michels — iron law of oligarchy</b>; trivialization of the individual in formal organizations.","<b>Informal organization</b>: roles and networks that arise outside the 'blueprint'."]},{"h":"H10 — Crime","p":["<b>Crime statistics</b> = actual behaviour + <b>reporting behaviour</b>; an increase can be due purely to changed reporting or policing behaviour.","<b>Functions of punishment</b>: deterrence, retribution/revenge, restoration.","<b>Medicalization</b>: problem behaviour is increasingly seen as an 'illness' beyond the person's responsibility (an expansion of the <b>sick role</b>)."]},{"h":"H11 — Inequality","p":["<b>Social inequality</b> = a difference in <b>valuation</b> between (groups of) people — not just diversity; it sometimes manifests as a class system.","<b>Measuring poverty</b>: budget/basket method, deprivation method, relative method (% of median income), subjective method, legal minimum.","<b>Esping-Andersen — welfare state types</b>: liberal, corporatist, social-democratic."]},{"h":"H12 — Power and stratification","p":["<b>Foucault — power</b>: above all the power to have a <b>definition of reality</b> accepted by others, not merely rewarding/punishing.","<b>Separation of powers</b> prevents the <b>illegitimate transformation of power</b>: clientelism, corruption, bribery.","<b>Prestige</b> = the possession of social and political power."]},{"h":"H13 — Power and the architecture of society","p":["<b>Total institution (Goffman)</b>: through <b>initiation rituals</b> a new member is symbolically 'destroyed' and detached from their former identity.","<b>Motivation through convictions</b>: an organization that binds members through their convictions can hardly change its goal or dismiss members."]},{"h":"H14 — The run-up to modernization","p":["<b>Gemeinschaft vs Gesellschaft (Tönnies)</b>: community/security versus rational/businesslike.","<b>Longing for community</b>: nostalgia for community as a reaction to modernization; explained by <b>differentiation theory</b> (family and production grow apart).","<b>Culturalists vs dependistas</b> (underdevelopment): endogenous factors (culture, location) versus unequal relations between countries ((neo)colonialism)."]},{"h":"H15 — The transformation (modernization)","p":["<b>Differentiation of family and production</b>: paternal authority no longer governs the economy; the son does not automatically take over the occupation → a sense of redundancy.","<b>Sacralization of the child (Zelizer)</b>: in the more emotional family the child becomes 'sacred'/priceless.","<b>Illness & morality</b>: illness can take on a moral meaning; illness, sin and crime were not always clearly separated."]},{"h":"H16 — The transformation of interaction frames","p":["<b>Cleavages</b>: long-lasting oppositions that shape politics (e.g. the language struggle) and touch on the definition of the community.","<b>Pillarization</b> = sociologically <b>segmented pluralism</b>.","<b>Shift</b> from primary to secondary interaction frames due to scaling-up and differentiation."]},{"h":"🔑 Key thinkers (brief)","p":["<b>Durkheim</b> — social facts, collectivist view, relative autonomy of the social.","<b>Weber</b> — bureaucracy, authority, Verstehen.","<b>Merton</b> — Matthew effect, ritualism, self-fulfilling prophecy.","<b>Goffman</b> — dramaturgy, impression management, role distance, total institution.","<b>Foucault</b> — power as the definition of reality.","<b>Bourdieu</b> — habitus, taste & social position.","<b>Tönnies</b> — Gemeinschaft/Gesellschaft. &nbsp; <b>Mauss</b> — the gift & reciprocity. &nbsp; <b>Olson</b> — collective action & free-rider.","<b>Esping-Andersen</b> — types of welfare state. &nbsp; <b>Zelizer</b> — sacralization of the child. &nbsp; <b>Michels</b> — iron law of oligarchy."]}];

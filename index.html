<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">

<title>Sociologie oefenen — Berie's exam space</title>
<meta name="description" content="Gratis oefentool voor het examen Sociologie (1ste bachelor): meerkeuzevragen met directe feedback, per hoofdstuk en als examensimulatie.">
<style>
  :root{
    --bg:#f6f7fb; --bg2:#ffffff; --ink:#15171c; --muted:#697086; --line:#e6e8ef;
    --accent:#4f46e5; --accent-ink:#4338ca; --accent-soft:#eef0fe;
    --good:#15803d; --good-soft:#e9f7ef; --bad:#b42318; --bad-soft:#fdeceb; --amber:#b45309;
    --r:16px; --shadow:0 1px 2px rgba(20,23,28,.06); --shadow-lg:0 18px 50px rgba(20,23,28,.14);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  [data-theme="dark"]{
    --bg:#0b0d12; --bg2:#13161d; --ink:#eef0f5; --muted:#9aa1b4; --line:#252a35;
    --accent:#818cf8; --accent-ink:#a5b4fc; --accent-soft:#1b2030;
    --good:#4ade80; --good-soft:#11231a; --bad:#f87171; --bad-soft:#2a1414; --amber:#fbbf24;
    --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-lg:0 24px 60px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto;padding:0 18px 80px}
  header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(150%) blur(14px);-webkit-backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid var(--line)}
  .topin{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:11px 18px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em}
  .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:var(--shadow)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11.5px;letter-spacing:0}
  .spacer{flex:1}
  .iconbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:10px;padding:7px 11px;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,transform .1s}
  .iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:scale(.97)}
  h1{font-size:clamp(26px,4.5vw,38px);letter-spacing:-.03em;margin:26px 0 6px}
  .sub{color:var(--muted);margin:0 0 22px}
  .seclabel{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);margin:26px 0 12px}
  .grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}
  @media(max-width:560px){.g2{grid-template-columns:1fr}}
  .mode{display:flex;flex-direction:column;gap:4px;text-align:left;width:100%;border:1px solid var(--line);background:var(--bg2);border-radius:var(--r);padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .18s var(--ease),border-color .2s,box-shadow .2s}
  .mode:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
  .mode:active{transform:translateY(-1px)}
  .mode b{font-size:16px}.mode small{color:var(--muted);font-size:13px}
  .mode:disabled{opacity:.5;cursor:default}.mode:disabled:hover{transform:none;border-color:var(--line);box-shadow:var(--shadow)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s}
  .chip:hover{border-color:var(--accent)} .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:20px}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:11px 18px;cursor:pointer;transition:filter .2s,transform .1s;box-shadow:var(--shadow)}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:scale(.98)} .btn:disabled{opacity:.45;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .backlink{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;padding:8px 0;margin-top:8px}
  .backlink:hover{color:var(--ink)}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-ink);font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px}
  .runtop{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .bar{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-ink));width:0;transition:width .5s var(--ease)}
  .qmeta{color:var(--muted);font-size:12.5px;margin:2px 0}
  .qinstr{font-weight:700;color:var(--accent-ink);font-size:13.5px;margin:10px 0 2px}
  .qtext{font-size:18px;font-weight:600;letter-spacing:-.01em;margin:6px 0 16px}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;font-size:14.6px;transition:border-color .15s,background .15s,transform .1s}
  .opt:hover{border-color:var(--accent)} .opt:active{transform:scale(.995)}
  .opt .bx{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;margin-top:1px;transition:all .15s}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft)} .opt.sel .bx{background:var(--accent);border-color:var(--accent);color:#fff}
  .opt.correct{border-color:var(--good);background:var(--good-soft)} .opt.correct .bx{background:var(--good);border-color:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)} .opt.wrong .bx{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt[disabled]{cursor:default}
  .opt .bx svg{width:14px;height:14px}
  .fb{border-radius:12px;padding:13px 15px;margin:6px 0 4px;font-size:14.5px;font-weight:600}
  .fb.ok{background:var(--good-soft);color:var(--good)} .fb.no{background:var(--bad-soft);color:var(--bad)}
  .note{background:color-mix(in srgb,var(--amber) 12%,transparent);border:1px solid color-mix(in srgb,var(--amber) 35%,transparent);color:var(--ink);border-radius:10px;padding:10px 13px;font-size:13px;margin:8px 0}
  .simtimer{font-variant-numeric:tabular-nums;font-weight:800}.simtimer.low{color:var(--bad)}
  .results{text-align:center}
  .ring{width:128px;height:128px;margin:6px auto}
  .rev{border-left:3px solid var(--line);padding:8px 0 8px 12px;margin:10px 0;font-size:14px;text-align:left}
  .rev.ok{border-color:var(--good)}.rev.no{border-color:var(--bad)}
  .rev .rq{font-weight:600;margin-bottom:4px}.rev .ra{color:var(--muted);font-size:13px}
  .sumsec{margin:14px 0}.sumsec h3{margin:0 0 6px;font-size:16px}.sumsec ul{margin:6px 0 0;padding-left:18px}.sumsec li{margin:4px 0;font-size:14px}
  .visits{color:var(--muted);font-size:13px;margin:8px 0 0}
  /* splash */
  #splash{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 35%,var(--bg2),var(--bg) 70%);transition:opacity .55s var(--ease),transform .6s var(--ease)}
  #splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
  .sp-logo{width:84px;height:84px;border-radius:22px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:40px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 14px 40px rgba(79,70,229,.45)}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fadein{animation:fade .4s var(--ease) both}
  .credit{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-ink);font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:999px;margin:-8px 0 18px}
  .share{display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:1.5px solid var(--accent);background:var(--accent-soft);border-radius:var(--r);padding:14px 16px;margin:20px 0 0;cursor:pointer;text-decoration:none;color:var(--ink);transition:transform .18s var(--ease),box-shadow .2s}
  .share:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .share .si{flex:none;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(150deg,var(--accent),var(--accent-ink));font-size:18px}
  .share b{display:block;font-size:14.5px} .share small{color:var(--muted);font-size:12.5px}
</style>
</head>

<script>
/* ===================== DATA ===================== */
// o: opties — [tekst, sleutel] waarbij sleutel 1 = "aan te duiden antwoord".
// pick = aantal aan te duiden. sel = "juiste" of "foute". note = optionele waarschuwing.
var CHAPTERS = {
 1:"De sociologische verzuchting",2:"De taak en houding van de socioloog",
 3:"De ontdekking van de samenleving I (individualistisch)",4:"De ontdekking van de samenleving II (collectivistisch)",
 5:"Rol en zelf",6:"Verwachten en verklaren",7:"Socialisatie en methoden van samenleven",
 8:"Sociale controle",9:"Maatschappelijke schaalvergroting",10:"Criminaliteit",11:"Ongelijkheid",
 12:"Macht en stratificatie",13:"Macht en de architectuur van de samenleving",14:"De aanloop tot modernisering",
 15:"De transformatie",16:"De transformatie van interactiekaders"
};
var SOCIO_DATA = [
 {c:1,sel:"juiste",pick:1,q:"Welke 'legitimerend verhaal' duikt op in Marx' theorie wanneer hij het heeft over de evolutie naar een klasseloze maatschappij?",o:[["Samenhang",0],["Differentiatie van arbeid",0],["Conflict",0],["Orde",0],["Empirische evidentie",0],["Collectieve actie",0],["Geschiedenis",1],["Rechtvaardigheid",0],["Ongelijke arbeidsverhoudingen",0],["Zelfvervullende voorspelling",0]]},
 {c:1,sel:"foute",pick:2,q:"Waarin verschillen de posities van Luhmann en Habermas ten aanzien van het arbitraire? Duid de twee FOUTE antwoorden.",o:[["Habermas meent dat via open en redelijke communicatie keuzes gemaakt kunnen worden die het arbitraire opheffen.",0],["Habermas zet zich af tegen de ideeën van de Verlichting en ziet geen heil in redelijke oplossingen; instellingen als religie en traditie zijn beter geplaatst.",1],["Luhmann is een overtuigde Verlichtingsdenker; wetenschap is de enige echte methode om zeker te weten wat de waarheid is.",1],["Volgens Luhmann moeten we leren leven met het arbitraire; een consensus is immers onmogelijk.",0],["Volgens Habermas kan de wetenschap ons niet vertellen wat we moeten nastreven maar enkel hoe we vooropgestelde doelstellingen kunnen bereiken.",0]]},
 {c:1,sel:"juiste",pick:2,q:"Welke inzichten en bijdragen leverde Comte aan het ontstaan en de ontwikkeling van de sociologie als wetenschap?",o:[["Dat vooroordelen en belangen een realistische en nuchtere kijk op sociale fenomenen versluieren.",0],["Dat de sociologie zich moet bezighouden met het zoeken naar regelmaten in het handelen van mensen en geen metafysische vragen moet stellen over de oorsprong van de mens.",1],["Dat sociologen een zekere afstandelijkheid aan de dag moeten leggen ten aanzien van hun onderzoeksobject.",0],["Het idee dat het sociale van natuurlijke oorsprong is.",0],["Een positivistische benadering van de sociale werkelijkheid: een zakelijke, op wetenschappelijke observatie en logica steunende onderzoekswijze van de samenleving.",1]]},
 {c:1,sel:"juiste",pick:2,q:"Een belangrijke sociologische les is dat alles contingent is maar daarom nog niet arbitrair. Welke twee uitspraken zijn in overeenstemming met die les?",o:[["Onze instituties hadden ook een totaal andere vorm kunnen aannemen.",1],["Er is geen goede reden voor de vorm die instituties bij ons hebben aangenomen.",0],["Iets is noch noodzakelijk, noch onmogelijk.",1],["De samenleving en de geschiedenis zijn totaal beheersbaar.",0],["Wetten, reglementen en gewoonten berusten op natuurwetten.",0]]},
 {c:1,sel:"juiste",pick:2,q:"Wat bedoelen sociologen als ze het hebben over '(het probleem van de) orde'?",o:[["Het behoud van de mogelijkheid om tot nageleefde regels te komen.",1],["Het behoud van de bestaande machtsverhoudingen, wetten, gewoontes, verwachtingen, enzovoort.",0],["Het besef dat bij te hoge criminaliteit het samenleven sterk bemoeilijkt wordt.",0],["Het geheel van regels, verwachtingen, normen, enzovoort, die het leven een zekere voorspelbaarheid en berekenbaarheid geven.",1],["Het besef dat over de tijd gewoontes, instellingen en wetten variabel zijn.",0]]},
 {c:1,sel:"foute",pick:2,q:"Op welke basis legitimeren samenlevingen (die beseffen dat hun organisatie contingent is) hun wetten, gewoontes en instellingen? Duid de twee FOUTE antwoorden.",o:[["Geschiedenis",0],["Natuur",0],["Samenhang",0],["Conflict",1],["Materiële noodzaak",1]]},
 {c:1,sel:"juiste",pick:2,q:"Alcoholische dranken worden in België legaal geconsumeerd, verkocht en gestockeerd, maar dat is niet zo in alle landen. Dit is een voorbeeld van…",o:[["Een doorgedreven fanatisme.",0],["Het arbitraire van gedragsregels.",0],["Een waardenconflict.",0],["De wet als constructie en conventie.",1],["Het contingente van de sociale regels.",1]]},
 {c:2,sel:"juiste",pick:2,q:"Voor Durkheim was godsdienst een verschijnsel ('feit') dat op empirisch-analytische wijze moest worden verklaard. Welke conclusies kunnen we trekken over de manier waarop Durkheim godsdienst bestudeert?",o:[["Dat geloof en rite slechts vergissingen, onwetenschappelijke opvattingen en barbaarse gebruiken zijn.",0],["Dat stellingen uit godsdienstige bronnen als waarheden beschouwd moeten worden door sociologen.",0],["Dat de houding van Durkheim getuigt van een sociologisch respect voor de gelijkwaardigheid van verschijnselen.",1],["Dat volgens Durkheim religie weinig betekenis heeft, zowel voor gelovigen als voor wie op een andere manier zingeving zoekt.",0],["Dat religie niet gebruikt kan worden om gedrag te verklaren; het is een feit dat los staat van de samenleving.",0],["Dat volgens Durkheim instellingen die wijdverspreid en duurzaam zijn, niet kunnen afgedaan worden als berustend op een leugen of een vergissing.",1],["Dat een socioloog alleen de algemene religieuze voorschriften moet bestuderen.",0],["Dat religie volgens Durkheim, net als alle sociale fenomenen, een rationele grondslag heeft.",0],["De houding van Durkheim toont dat hij het symbolisch interactionisme aanhangt.",0],["Dat religies altijd zullen blijven bestaan omdat het eigen is aan de menselijke natuur.",0]]},
 {c:2,sel:"juiste",pick:2,q:"Men kan Marx en Freud beschouwen als inspiratiebronnen van de kritische sociologie omdat zij…",o:[["…het oneens waren met de bestaande maatschappijorganisatie en deze wilden veranderen.",0],["…gekant waren tegen de bestaande, heersende klassen.",0],["…betrokken waren bij revolutionaire bewegingen.",0],["…van oordeel waren dat er achter de schijnbare werkelijkheid een diepere, meer betekenisvolle werkelijkheid schuilgaat.",1],["…meenden dat kennis kan leiden tot bevrijding en emancipatie van mensen.",1]]},
 {c:2,sel:"juiste",pick:2,q:"Respect voor het studieobject betekent volgens Durkheim…",o:[["Dat alle sociale gedragingen gelijkwaardig zijn.",0],["Dat men slechts het gedrag van mensen van de eigen cultuur kan begrijpen.",0],["Dat men voor elk soort gedrag naar een verklaring dient te zoeken.",1],["Dat het gedrag van mensen altijd op wetenschappelijk correcte gronden berust.",0],["Dat men gedrag niet meteen aan een vergissing mag toeschrijven.",1]]},
 {c:2,sel:"juiste",pick:2,q:"Welke regels of principes onderbouwen het geven van geschenken (Marcel Mauss)?",note:"Mogelijke boekfout: 'proportionaliteit' is geen klassiek Maussiaans principe (kern = reciprociteit). Nakijken met cursus.",o:[["Functionaliteit",0],["Proportionaliteit",1],["Normativiteit",0],["Reciprociteit",1],["Vermogendheid",0]]},
 {c:2,sel:"foute",pick:2,q:"Hieronder staan uitspraken over de taken van de socioloog. Welke twee zijn FOUT?",o:[["De kritische sociologie kan de bestaande waarden en overtuigingen niet aanvaarden.",1],["De kritische socioloog wil door inzicht in het functioneren van de samenleving de zelfgemaakte, doch verborgen beperkingen ervan aan het licht brengen.",0],["Het doel van de empirisch-analytische kennis is de bestaande belangenconstellaties in de maatschappij te doorbreken.",1],["De praktische sociologie wil ons door inzicht ook van de waarneming van de sociale werkelijkheid laten genieten.",0],["Het ontsluieren van de werkelijkheid die doorgaans verborgen blijft, is het belangrijkste doel van de sociologie.",0]]},
 {c:2,sel:"juiste",pick:2,q:"Beck en Giddens verdedigen dat zich een proces van individualisering voordoet. Wat bedoelen ze hiermee?",o:[["Mensen hebben geen oog meer voor de problemen van anderen en handelen steeds meer uit louter eigenbelang.",0],["Jonge mensen geven in toenemende mate hun eigen levensloop vorm en bepalen zelf wat/wanneer ze studeren, met wie ze huwen, waar ze wonen enz.",1],["Steeds meer mensen vinden dat ze hun bezit mogen verdedigen met wapens.",0],["Kenmerken als sociale klasse of geslacht bieden weinig tot geen voorspellingskracht voor de opvattingen of smaken van individuen.",1],["Mensen informeren zich steeds minder bij experts en maken steeds meer op intuïtieve, haast instinctieve wijze keuzes.",0]]},
 {c:2,sel:"juiste",pick:2,q:"Wat wordt bedoeld met de 'empirische gezindheid' van de socioloog?",o:[["Dat de socioloog zich niet mag inlaten met de ideeën, vooroordelen en passies van de mensen/groepen die hij bestudeert.",0],["Dat de socioloog er steeds van moet uitgaan dat mensen rationeel en uit eigenbelang handelen.",0],["Dat de socioloog steeds bereid moet zijn de eigen opvattingen zonder vooroordelen te toetsen aan zijn waarnemingen en aan die van anderen.",1],["Dat de socioloog zich steeds op de rand van de samenleving moet houden en geen eigen opvatting mag hebben.",0],["Dat de socioloog zich niet mag laten verleiden tot abstracte opvattingen over het 'ware' wezen van de mens zonder deze te toetsen aan de empirische werkelijkheid.",1]]},
 {c:3,sel:"juiste",pick:1,q:"Een aangekondigde treinstaking deed een nooit geziene verkeersdrukte voorspellen; veel mensen pasten hun gedrag aan en de drukte bleef uit. Dit is een goed voorbeeld van…",o:[["een misplaatst gebruik van functionele analyse.",0],["een self-fulfilling prophecy.",0],["een Mattheus-effect.",0],["een Gropius-curve.",0],["een Popper-gevolg.",0],["de perverse effecten van rationeel sociaal handelen.",0],["de problemen bij extrapolaties uit statistische analyses zonder rekening te houden met intentioneel gedrag.",0],["een zelfvernietigende voorspelling.",1],["een onbedoeld gevolg van de mogelijkheid tot telewerken.",0],["een verkeerde definitie van de situatie van de verkeersdeskundigen.",0]]},
 {c:3,sel:"juiste",pick:2,q:"Onder het probleem van de collectieve actie (Olson) verstaan we:",o:[["het gegeven dat, tenzij collectieve goederen worden omgezet in individuele beloningen of straffen, een rationeel handelend individu zich niet zal inzetten voor het verwerven van die goederen.",1],["de problemen veroorzaakt door betogingen en protestacties.",0],["de moeilijkheden bij het coördineren van het handelen van verschillende personen.",0],["het probleem dat politieke bewegingen altijd geleid worden door wie het meeste tijd heeft.",0],["het feit dat individuen die rationeel en in hun eigen belang handelen, zich in grote groep niet inzetten voor het behartigen van collectieve belangen.",1]]},
 {c:3,sel:"juiste",pick:2,q:"Wat is het Mattheus-effect?",o:[["Merton wees met het Mattheus-effect op het cumulatieve karakter van wetenschappelijke erkenning: gereputeerde wetenschappers krijgen meer aandacht en middelen voor hun onderzoek.",1],["Het stelt dat welgestelde mensen, mits ze rationeel handelen, intelligenter en zorgvuldiger met hun geld omspringen dan minder welgestelden.",0],["Het toont aan dat individueel redelijk gedrag steeds tot redelijke uitkomsten leidt.",0],["Het wijst op de onbedoelde herverdelende invloed van veel sociaal beleid ('aan wie weinig heeft, zal genomen worden').",0],["Het Mattheus-effect is een voorbeeld van een onbedoeld, soms zelfs pervers effect.",1]]},
 {c:3,sel:"juiste",pick:2,q:"Welke uitspraken horen eerder thuis bij de Rational Choice-theorie dan bij Durkheims opvattingen over het sociale?",note:"Tweede sleutel ('effecten die aan individuele bedoelingen ontsnappen') lijkt eerder Durkheim — nakijken met cursus.",o:[["Wat individuen doen verschijnt als gevolg van regels, rollen en verwachtingen; het sociale schuilt in dergelijke verwachtingen.",0],["De eigensoortigheid van het sociale wordt aangetoond door de relatieve autonomie van het sociale t.o.v. andere werkelijkheidsniveaus.",0],["Het sociale is een onbedoeld, vaak ongewenst gevolg van het feit dat verschillende individuen tegelijkertijd rationeel en geïnteresseerd handelen.",1],["Het is de ontwikkeling van het sociale zelf die mensen ertoe brengt op weloverwogen, rationele wijze uit eigenbelang te handelen.",0],["Het eigensoortige van het sociale kan aangetoond worden door het bestaan van effecten die aan de individuele bedoelingen ontsnappen.",1]]},
 {c:3,sel:"juiste",pick:2,q:"Als mensen een gemeenschappelijk belang hebben dat via wetgeving kan worden opgelost, zullen zij volgens Olsons theorie van de collectieve actie…",o:[["Verenigingen oprichten om dat belang te behartigen.",0],["Zich verzetten tegen verenigingen die dat belang behartigen.",0],["Niet uit eigen beweging aansluiten bij organisaties die dat belang behartigen.",1],["Slechts onder druk bij dergelijke acties aansluiten.",1],["De belangen van anderen dienen.",0]]},
 {c:3,sel:"foute",pick:2,q:"Welke elementen vinden we terug bij de denkers van de Verlichting? Duid de twee FOUTE antwoorden.",o:[["Het belang van het individu.",0],["Het geloof in de universele rede en moraal.",0],["Het geloof dat opvattingen die strijdig zijn met de rede aan de traditie kunnen worden geweten.",0],["Het principe van de gelijkheid van alle culturen.",1],["De opvatting dat mensen niet het eigenbelang maar het redelijke belang nastreven.",1]]},
 {c:3,sel:"juiste",pick:2,q:"Slechts twee van onderstaande uitspraken zijn juist. Welke?",o:[["Perverse effecten zijn tegennatuurlijk.",0],["Alle perverse effecten zijn onbedoelde effecten.",1],["Alle onbedoelde effecten zijn perverse effecten.",0],["Een zelf-bevestigende voorspelling is een voorbeeld van een onbedoeld effect.",1],["Het Mattheus-effect is een vorm van zelf-bevestigende voorspelling.",0]]},
 {c:4,sel:"juiste",pick:1,q:"Problematische handelingen worden steeds meer gezien als ontoereikendheden waarvoor men niet verantwoordelijk is en die via artsen/medische technologie behandeld worden. Hoe omschrijf je deze ontwikkeling het meest precies?",o:[["Toename van professionalisering",0],["Groeiende tolerantie",0],["Medicalisering",1],["Toename van het gezag van geneesheren",0],["Groeiende onbekwaamheid van de medische wetenschap",0],["Expansie van de medische sector",0],["Het gevolg van andere dan organische etiologieën",0],["De responsabilisering van de zieken",0],["'Blaming the victim'",0],["Een onbedoeld gevolg van de differentiatie van de ziekterol",0]]},
 {c:4,sel:"juiste",pick:2,q:"Welke twee visies op 'de sociale werkelijkheid' kleuren de zoektocht naar het object van de sociologie?",o:[["Het sociale is een afgeleide van de natuur.",0],["Het sociale is een groepsgebeuren.",0],["Het sociale resulteert uit het individueel handelen-in-het-meervoud en de onbedoelde gevolgen hiervan.",1],["Het sociale verschilt van het natuurlijke.",1],["Het sociale is contingent.",0]]},
 {c:4,sel:"juiste",pick:2,q:"Durkheim verzet zich tegen de rational choice-theorieën. Welke argumenten haalt hij hiertoe aan?",o:[["Hij meent dat het individu-zijn verschilt van samenleving tot samenleving, van cultuur tot cultuur.",1],["Hij aanvaardt het theoretisch uitgangspunt dat a priori een onderscheid maakt tussen individu en samenleving.",0],["Hij meent dat mensen nooit uit eigenbelang handelen.",0],["Hij meent dat individueel gedrag slechts te begrijpen is vanuit de materiële condities waaraan het handelen gebonden is.",0],["Hij meent dat de samenleving meer is dan de som van de individuen en dus niet begrepen kan worden als een (ongewenst) bijproduct van het individuele handelen.",1]]},
 {c:4,sel:"juiste",pick:2,q:"Welke argumenten hanteren de tegenstanders van de rational choice-theorieën?",o:[["Het is slechts een veronderstelling dat mensen steevast uit eigenbelang handelen.",1],["De verdedigers van de rational choice-theorie hebben enkel oog voor de sociale context waarbinnen preferenties tot stand komen.",0],["De aanhangers ontkennen dat collectieve actie door dwang of geweld tot stand kan komen.",0],["De rational choice-theorieën zijn gericht op een status quo van de bestaande machtsverhoudingen.",0],["De aanhangers stellen zich niet de vraag vanwaar de preferenties van mensen komen.",1]]},
 {c:4,sel:"juiste",pick:2,q:"Het voorbeeld van de 'ziekterol' maakt duidelijk dat…",o:[["…rollen en gedragsverwachtingen vaak fundamenteler zijn dan individuele belangen en preferenties.",1],["…sociale verschijnselen uiteindelijk ook herleidbaar zijn tot objectieve, natuurlijke fenomenen.",0],["…gedragsverwachtingen uiteindelijk ook beschouwd kunnen worden als onbedoelde gevolgen van intentionele handelingen.",0],["…individuele belangen en preferenties aan de basis liggen van rollen en gedragsverwachtingen.",0],["…het sociale meer is dan een onbedoeld gevolg van intentionele handelingen.",1]]},
 {c:4,sel:"juiste",pick:2,q:"Het verschil tussen de verschijnselen ziekte en ziekterol blijkt onder meer uit het feit dat:",o:[["de gezondheid kan worden omschreven als een toestand van volledig fysiek welzijn.",0],["er tegen de uitbreiding van de ziekterol al heel wat reacties zijn gekomen.",0],["de hedendaagse ziekterol onvoldoende betekenis kan geven aan de verschijnselen 'lijden' en 'dood'.",0],["de uitbreiding van de ziekterol niet aan ontwikkelingen in de medische wetenschap kan worden toegeschreven.",1],["het gebruik van de ziekterol niet tot de kennis van de natuur kan worden gereduceerd.",1]]},
 {c:4,sel:"juiste",pick:2,q:"Welke kenmerken of inzichten koppelde Parsons aan de ziekterol?",o:[["Iemand aan wie de ziekterol is toegekend moet via uiterlijke kenmerken aan de omgeving duidelijk maken dat hij/zij werkelijk ziek is.",0],["Een persoon aan wie de ziekterol is toegekend hoeft niet normaal te functioneren; de ziekterol is een 'sociale' vertaling van de objectieve condities van het lichaam.",0],["De zieke wordt niet gestraft omwille van zijn onbekwaamheid, maar dient wel blijk te geven van een wil tot genezen.",1],["Enkel gediplomeerde geneesheren kunnen in onze samenleving de ziekterol toewijzen.",0],["Bij de toekenning van de ziekterol vervalt de verwachting dat deze persoon zich 'normaal' dient te gedragen; hij hoeft niet te voldoen aan de gangbare gedragsverwachtingen.",1]]},
 {c:5,sel:"juiste",pick:1,q:"Onder 'geïnternaliseerde' regels verstaan we de regels die:",o:[["als het ware 'tweede natuur' zijn geworden.",1],["deel zijn geworden van de groep of organisatie.",0],["die een cultuur zich eigen heeft gemaakt.",0],["die men niet kan overtreden zonder geïnterneerd te worden in een psychiatrische instelling.",0],["die eerst in etiquetteboeken werden geformuleerd en dan vanzelfsprekend zijn geworden.",0],["men aanleert wanneer men in een psychiatrische instelling geïnterneerd wordt.",0],["het scenario vormen voor het vlot spelen van onze rollen.",0],["de interne structuur van organisaties vastleggen.",0],["men gemakkelijk kan overtreden.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Wat wordt bedoeld met roldistantie?",note:"Let op (mogelijke boekfout): het 1e gemarkeerde antwoord beschrijft eigenlijk rol-IDENTIFICATIE, niet roldistantie. Volgens Goffman is alleen 'maskers afleggen / backstage' juist. Nakijken met cursus.",o:[["Als we rollen spelen identificeren we ons vaak met de andere personen in de interactie (bv. de lesgever die zich identificeert met de student).",1],["Roldistantie doet zich voor wanneer iemand een rol speelt die hij/zij eigenlijk niet kan of mag spelen (bv. de portier die professor speelt).",0],["Roldistantie treedt op wanneer mensen hun 'maskers' afleggen en uit hun rollen treden, of in Goffmans termen: als men 'backstage' is.",1],["Roldistantie is een begrip uit de dramaturgische roltheorie; het verwijst naar situaties waarbij bewust een rol wordt gespeeld ('impression management') zonder dat het echte 'zelf' erbij betrokken is.",0],["Roldistantie treedt op wanneer aan de verwachtingen die met een bepaalde rol verbonden zijn niet langer voldaan wordt.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Hoe verhouden Goffmans dramaturgische benadering en het symbolisch interactionisme (Mead) zich tot elkaar?",o:[["Volgens Goffman is complete roldistantie niet mogelijk, rolgedrag daarentegen wel.",0],["Zowel Mead als Goffman beschouwen de sociale werkelijkheid vanuit het perspectief van de actor en de rollen die hij/zij speelt.",1],["Volgens Mead is de dramaturgische benadering te individualistisch: volgens hem bestaan individuen dankzij de rollen die ze spelen.",1],["Goffman stelt dat individuen via de kennis van verschillende rollen zelfbewustzijn verwerven.",0],["Zowel Mead als Goffman hanteren een rationeel-utilitair mensbeeld.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Welke verschillen kunnen we onderscheiden tussen de conflictsociologie en de functionalistische sociologie? (variant)",o:[["Functionalisten maken volgens conflictsociologen te vaak gebruik van samenhang als legitimerend verhaal.",1],["Conflictsociologen hebben doorgaans meer oog voor de rol van dwang in het sturen van het menselijk gedrag dan functionalisten.",1],["Functionalisten zullen meer dan conflictsociologen veel aandacht hebben voor sociale ongelijkheid.",0],["Functionalisten zijn meer geneigd de verklaring van menselijk gedrag te zoeken in de socialisatie en internalisatie van opvattingen en houdingen.",0],["Conflictsociologen hebben geen aandacht voor het belang van rollen in de samenleving.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Wat is een 'sociale rol'?",o:[["Het geheel van normen en regels die mensen wel weten te gebruiken, doch niet uitdrukkelijk kunnen formuleren.",0],["Een mechanisme dat het handelen van anderen een mate van voorspelbaarheid geeft.",1],["Het geheel van verwachtingen ten opzichte van iemand in een bepaalde, zich herhalende situatie.",1],["Het geheel van geïnternaliseerde gedragsverwachtingen die bepalen hoe ego moet reageren op alter in contacten tussen vreemde culturen.",0],["Het sociale leven kan beschouwd worden als een reeds geschreven stuk waarin iedereen de rol speelt die voor hem/haar is weggelegd.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Welke verschillen kunnen we maken tussen de conflictsociologie en de functionalistische sociologie?",o:[["Conflictsociologen maken volgens de functionalisten te veel gebruik van samenhang als legitimerende derde.",0],["Conflictsociologen hebben doorgaans meer oog voor de rol van dwang in het sturen van het menselijke gedrag dan functionalisten.",1],["Functionalisten zullen meer dan de hedendaagse conflictsociologen aandacht hebben voor sociale ongelijkheid.",0],["Functionalisten zijn meer geneigd de verklaring van menselijk gedrag te zoeken in de socialisatie en internalisatie van opvattingen en houdingen.",1],["Conflictsociologen hebben geen aandacht voor het belang van rollen in de samenleving.",0]]},
 {c:5,sel:"juiste",pick:2,q:"Welke kritieken krijgen de functionalistische theorieën?",o:[["Dat in sommige van deze theorieën verondersteld wordt dat fenomenen die een duidelijke functie hebben voor de samenleving, zich wel degelijk zullen voordoen.",1],["Dat deze theorieën het individualistische micro-perspectief overmatig beklemtonen, ten nadele van een globale macro-analyse.",0],["Dat deze theorieën te veel oog hebben voor de rol van conflict en dwang.",0],["Dat deze theorieën niets vertellen over het waarom van individuele preferenties.",0],["Dat in deze theorieën te vaak naar samenhang als legitimerende derde wordt gegrepen en zo een status quo van de bestaande orde wordt verdedigd.",1]]},
 {c:6,sel:"juiste",pick:1,q:"Hoe noemt men de studie die regelmaten in het menselijk handelen niet enkel meet, maar ook plaatst/verklaart in het licht van de interpretaties, opvattingen en verwachtingen van de betrokkenen?",o:[["Zelfwerk",0],["Waardengetrouw",0],["Hermeneutiek",1],["Verwantschapsleer",0],["Veldwerk",0],["Voluntarisme",0],["Functionele analyse",0],["Confucianisme",0],["Eugenetica",0],["Introspectief",0]]},
 {c:6,sel:"juiste",pick:2,q:"Welke kritieken geeft de hermeneutische benadering van Wilhelm Dilthey op de 'Verstehende methode' van Max Weber?",o:[["Webers benadering is te collectivistisch door de klemtoon op de gedetermineerdheid van handelen.",0],["Weber spiegelt zijn benadering te veel aan de natuurwetenschappen.",0],["De Verstehende methode houdt geen rekening met motieven die mensen hebben om bepaalde handelingen te stellen.",0],["Weber gaat er te veel vanuit dat alle individuen op eenzelfde manier reageren in sociale situaties.",1],["Dilthey vestigt, in tegenstelling tot Weber, de aandacht op het belang van culturele verschillen in het begrijpen van handelingen.",1]]},
 {c:6,sel:"juiste",pick:2,q:"De situationele aspecten van de handeling omvatten:",o:[["een definitie van de situatie.",0],["symbolen via dewelke de handeling kan worden voorgesteld.",0],["de middelen die ter beschikking van de actor staan.",1],["de condities waaraan de actor onderhevig is.",1],["de doelen waarop de handeling gericht is.",0]]},
 {c:6,sel:"juiste",pick:2,q:"Welke van onderstaande uitspraken over de sociale handeling zijn juist?",note:"Tweede sleutel (Utilitarisme: intentionele aspecten in alle culturen dezelfde) — nakijken met cursus.",o:[["Symbolen en hun betekenissen zijn communicatieve aspecten van de handeling.",1],["Een hermeneutische benadering zal vooral het kennen en begrijpen van de intentionele aspecten (doelen, normen) als een wetenschappelijk probleem formuleren.",0],["Aanhangers van het Utilitarisme menen dat de intentionele aspecten van de handeling in alle culturen dezelfde zijn.",1],["De definitie van de situatie biedt een inventaris van middelen en condities.",0],["De kennis die de middel-doelrelaties onderbouwt, is universeel en objectief.",0]]},
 {c:6,sel:"foute",pick:2,q:"Duid de twee FOUTE uitspraken over het Utilitarisme aan.",o:[["Het Utilitarisme acht de culturele componenten doel en norm onbelangrijk.",1],["Het Utilitarisme maakt een onderscheid tussen universele doelen en natuurlijke doelen.",0],["Eerlijkheid, rechtvaardigheid en waarheid zijn volgens het Utilitarisme natuurlijke doelen.",1],["Het Utilitarisme gaat ervan uit dat er een aantal natuurlijk gegeven doelen zijn.",0],["Volgens het Utilitarisme streeft de mens zijn doelen zo rationeel mogelijk na.",0]]},
 {c:6,sel:"juiste",pick:2,q:"Welke bedenkingen kunnen worden geformuleerd bij de Verstehende-methode van Weber?",o:[["De aanhangers focussen in hun studie van de sociale werkelijkheid overmatig op causaliteit.",0],["Deze methode biedt weinig mogelijkheden om de interpretatie van de onderzoeker te toetsen; ze blijft erg subjectief.",1],["Het volstaat niet om statistische regelmaten te observeren.",0],["Deze methode werkt beter dicht bij huis en voor de eigen groep dan voor groepen of culturen die geografisch of in de tijd ver verwijderd zijn.",1],["Deze methode verliest de praktische taak van de socioloog uit het oog.",0]]},
 {c:6,sel:"juiste",pick:2,q:"Wat bedoelt Luhmann als hij zegt: 'Normen zijn verwachtingen die niet leren.'?",o:[["Als normatieve verwachtingen niet worden nageleefd, wordt sanctionerend opgetreden.",1],["Het frustreren van cognitieve verwachtingen wekt hevige reacties van afkeer of walging op.",0],["Cognitieve verwachtingen worden na verloop van tijd aangepast of veranderd wanneer ze niet nageleefd worden.",1],["Normatieve verwachtingen passen zich niet aan maar worden na verloop van tijd cognitief van aard.",0],["Normatieve verwachtingen steunen louter op discursieve kennis.",0]]},
 {c:7,sel:"juiste",pick:1,q:"Sociale regels en betekenissen die we onbewust kennen en hanteren (bv. niet te lang aanstaren in de lift, niet slurpen). Hoe noemen sociologen dit?",o:[["Rolverwachtingen",0],["Discursieve kennis",0],["Internalisatie",0],["Elementaire kennis",0],["Socialisatie",0],["Normatieve kennis",0],["Symbolische kennis",0],["Praktische kennis",1],["Interactionele kennis",0],["Ethnomethodologische kennis",0]]},
 {c:7,sel:"juiste",pick:2,q:"Welke twee uitspraken over sanctioneren zijn juist?",note:"Tweede sleutel (schuldgevoelens horen volgens het schema bij waardengetrouwheid, niet beïnvloeding) — nakijken met cursus.",o:[["Beïnvloeden veronderstelt solidariteit.",1],["Bij het activeren van waardengetrouwheid zal men de verbondenheid bevestigen.",0],["Geld is het symbolische medium voor bestraffen.",0],["Schuldgevoelens zijn het gevolg van beïnvloeding.",1],["Bij positieve sancties wordt de belofte ten uitvoer gebracht als de verwachting wordt ingelost.",0]]},
 {c:7,sel:"juiste",pick:2,q:"Waarom kunnen technologische innovaties (videoconferentie, e-mail) volgens Boden en Molotch face-to-face interactie niet volledig vervangen?",o:[["Face-to-face contact biedt meer informatieoverdracht, via onder andere non-verbale kanalen.",1],["Face-to-face contacten laten toe om 'frontstage' de intenties van de ander te toetsen aan zijn/haar gedrag als hij/zij 'backstage' gaat.",0],["Face-to-face contact maakt 'interactioneel vandalisme' onmogelijk.",0],["Face-to-face contact biedt de mogelijkheid om sneller te anticiperen bij storingen in de communicatie.",1],["Face-to-face contact is indringender omdat men hierbij de persoonlijke ruimte van de ander kan binnendringen.",0]]},
 {c:7,sel:"juiste",pick:1,q:"Welke uitspraak over kennis en socialisatie is juist?",note:"Boek: er is maar één correct antwoord aangeduid.",o:[["Socialisatie kan slechts ten dele uit onderwijs bestaan omdat de kennis die erbij verworven wordt in grote mate praktisch eerder dan discursief is.",1],["De kennis van gedragscodes die voorschrijven hoe mensen zich dienen te gedragen, noemen we praktische kennis.",0],["De kennis die steunt op de regelmaten die zich voordoen in het leven, noemen we discursieve kennis.",0],["Van normatieve verwachtingen maakt men al snel gedragsregelmaten, met andere woorden cognitieve verwachtingen.",0],["Mensen veranderen hun cognitieve verwachtingen als deze niet worden nageleefd.",0]]},
 {c:7,sel:"juiste",pick:2,q:"Welke zijn de centrale doelstellingen van de 'blauwdruk-theorie' van de sociale orde?",o:[["De meeste mensen kennen en respecteren de regels van het sociale leven; aldus ontstaat een grote mate van voorspelbaarheid in de samenleving.",1],["Discursieve regels dienen omgezet te worden tot praktische regels om het begrip van het alledaagse leven te vergroten.",0],["Het is quasi onmogelijk om alle praktische betekenissen, regels en normen van het alledaagse sociale leven te verwoorden.",0],["De regels die het gedrag van mensen sturen, worden op jonge leeftijd geïnternaliseerd en onveranderd van generatie op generatie doorgegeven.",0],["Via observatie kan men de regels die het sociale leven beheersen, ontdekken.",1]]},
 {c:7,sel:"juiste",pick:2,q:"De ethnomethodologie kent een specifieke benadering van de sociale werkelijkheid. Welke uitspraken zijn correct?",o:[["Ethnomethodologen proberen op basis van de studie van dagelijkse handelingen en communicatie de fundamentele regels van het samenleven (een sociale grammatica) te ontdekken.",1],["Vernieuwing van rollen, normen en conventies is binnen de ethnomethodologie niet mogelijk gezien de robuustheid van het sociale.",0],["De ethnomethodologie heeft een aantal mechanismen (zoals humor, afwachten, tact) aan het licht gebracht die ervoor zorgen dat het vertrouwen in normen en verwachtingen niet geheel geschaad wordt door het afwijken of frustreren ervan.",1],["Ethnomethodologen nemen aan dat het mogelijk is om alle praktische kennis om te zetten in discursieve kennis.",0],["Ethnomethodologen zijn ervan overtuigd dat de sociale constructie van de werkelijkheid transparant en eenvoudig te achterhalen is.",0]]},
 {c:7,sel:"juiste",pick:2,q:"'Tact', humor en 'uitleggen' zijn mechanismen die…",o:[["ertoe bijdragen dat het sociale leven draaglijk wordt.",0],["ertoe bijdragen dat de gevolgen van gefrustreerde verwachtingen beperkt worden.",1],["ertoe bijdragen dat overtredingen van normen opgevangen worden zonder dat deviantie wordt vastgesteld.",1],["ertoe bijdragen dat de sociale orde zonder veel problemen verstoord kan worden.",0],["ertoe bijdragen dat sociale controle ontweken kan worden.",0]]},
 {c:8,sel:"juiste",pick:1,q:"Wanneer we iemand een negatieve sanctie willen opleggen door in te spelen op overtuigingen:",o:[["is de voorwaarde solidariteit.",0],["noemen we dat bestraffen.",0],["kan deze sanctie circuleren via het symbolische medium invloed.",0],["activeren we de waardengetrouwheid.",1],["krijgt de gesanctioneerde schuldgevoelens en bevestigen wij zijn verbondenheid.",0],["is de voorwaarde voor de sanctionering veralgemeende waarden.",0],["gebruiken we beïnvloeding als sanctionering.",0],["is het gevolg waardengetrouwheid.",0],["gebruiken we reguliere macht.",0],["is de basis de controle over nuttige middelen.",0]]},
 {c:8,sel:"juiste",pick:2,q:"Wat verstaan sociologen onder 'sociale controle'?",o:[["Het geheel van handelingen om het gedrag van anderen te beïnvloeden.",1],["Het geheel van handelingen die afwijking begrijpelijk en aanvaardbaar maken.",0],["Het geheel van handelingen die gesteld worden om afwijking of krenking van verwachtingen te voorkomen.",1],["Het geheel van sanctionerende handelingen die ingrijpen op de basisbehoeftes van de mens, namelijk veiligheid en fysiek welzijn.",0],["Het geheel van handelingen die specifieke verboden en geboden overbodig maken.",0]]},
 {c:8,sel:"juiste",pick:2,q:"Welke twee dichotomieën worden gekruist om de vier fundamentele typen van sancties te onderscheiden?",note:"Verificatie betwist 'cognitief vs emotioneel' — wellicht 'positief vs negatief'. Nakijken met cursus.",o:[["Cognitieve versus emotionele sancties.",1],["Inspelen op de materiële omstandigheden vs. inspelen op overtuigingen en gevoelens.",1],["Primaire versus secundaire sancties.",0],["Belonen versus bestraffen.",0],["Positief versus negatief sanctioneren.",0]]},

 {c:8,sel:"juiste",pick:1,q:"Als in het kader van de sanctioneringswijzen wordt gesproken van 'beïnvloeden', dan wordt daarmee bedoeld:",o:[["Het inspelen op waarden en idealen.",0],["Het in het vooruitzicht stellen van een beloning.",0],["Het steunen op de veronderstelling dat men in het beste belang van iemand handelt.",1],["Het rekenen op een overeenstemming van overtuigingen en waarden.",0]]},

 {c:11,sel:"juiste",pick:2,q:"Welke twee mechanismen schuilen onder de etiketteringstheorie?",o:[["Mensen die de slechte reputatie van een persoon kennen, gaan zijn/haar gedrag sneller interpreteren als afwijkend.",1],["De geëtiketteerde persoon internaliseert na verloop van tijd het negatieve beeld dat de anderen van hem/haar hebben.",1],["Personen in een sociaal zwakke positie zoeken compensatie via het 'zwartmaken' van welgestelde individuen.",0],["Het toekennen van een 'etiket' aan personen die afwijkend handelden, verkleint de kans dat ze recidiveren.",0],["Het statuscompenserende gedrag van personen uit een lage sociale klasse krijgt sneller een negatieve interpretatie.",0]]},

   "<b>Esping-Andersen</b> — types welvaartsstaat. &nbsp; <b>Zelizer</b> — sacralisering van het kind. &nbsp; <b>Michels</b> — ijzeren wet van de oligarchie."
 ]}
];
/* ===================== ENGINE ===================== */
(function(){
 var app=document.getElementById("app");
 function L(k,d){try{var v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}
 function S(k,v){try{localStorage.setItem(k,v);}catch(e){}}
 var theme=L("site_theme","light"); document.body.setAttribute("data-theme",theme);
 function applyTheme(){document.body.setAttribute("data-theme",theme);document.getElementById("themeBtn").textContent=theme==="dark"?"Licht":"Donker";}
 applyTheme();
 document.getElementById("themeBtn").onclick=function(){theme=theme==="dark"?"light":"dark";S("site_theme",theme);applyTheme();};
 function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
 function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
 function pct(n,d){return d?Math.round(100*n/d):0;}
 var CHK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';
 var XIC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>';
 var chaptersWith=function(){var s={};SOCIO_DATA.forEach(function(q){s[q.c]=(s[q.c]||0)+1;});return s;};
 var state={view:"home",pool:null,timer:null};
 function setHTML(h){app.innerHTML=h;}
 function render(){
   if(state.timer){clearInterval(state.timer);state.timer=null;}
   if(state.view==="home")return home();
   if(state.view==="chapters")return chapters();
   if(state.view==="summary")return summary();
   if(state.view==="quiz")return runQuiz();
 }
 function home(){
   var total=SOCIO_DATA.length;
   var html='<div class="fadein"><h1>Sociologie oefenen 💪</h1>'+
     '<p class="sub">'+total+' meerkeuzevragen uit het examen · 1ste bachelor · directe feedback met uitleg waar mogelijk.</p>'+
     '<div class="credit">🙌 Dit vak werd aangevraagd door medestudent Laure</div>'+
     '<div class="seclabel">Hoe wil je oefenen?</div>'+
     '<div class="grid g2">'+
       card("oefen","Oefenen","Alle vragen door elkaar, met meteen feedback na elke vraag.")+
       card("sim","Examensimulatie","Getimde toets — geen feedback tussendoor, score en overzicht op het einde.")+
       card("chap","Per hoofdstuk","Kies één of meer hoofdstukken (H1–H16) om gericht te oefenen.")+
       card("sum","Samenvatting","Korte concepten per hoofdstuk om snel op te frissen.")+
     '</div>'+
     '<a class="share" href="https://beriesexamspace.github.io/?deel=1"><span class="si">📚</span><span><b>Heb jij ook goeie samenvattingen?</b><small>Deel je vak → wij maken er gratis een oefentool van.</small></span></a>'+
     '<p class="visits">Tip: bij "kies de 2 foute antwoorden" duid je de <i>onjuiste</i> stellingen aan — let goed op de vraagstelling.</p>'+
   '</div>';
   setHTML(html);
   document.querySelector('[data-m=oefen]').onclick=function(){startQuiz(shuffle(SOCIO_DATA.slice()),"Oefenen",false);};
   document.querySelector('[data-m=sim]').onclick=function(){startQuiz(shuffle(SOCIO_DATA.slice()),"Examensimulatie",true);};
   document.querySelector('[data-m=chap]').onclick=function(){state.view="chapters";render();};
   document.querySelector('[data-m=sum]').onclick=function(){state.view="summary";render();};
 }
 function card(m,t,s){return '<button class="mode" data-m="'+m+'"><b>'+t+'</b><small>'+s+'</small></button>';}
 function chapters(){
   var cw=chaptersWith();var sel={};
   var html='<button class="backlink" id="bk">← Terug</button><h1>Per hoofdstuk</h1><p class="sub">Kies de hoofdstukken die je wil oefenen.</p><div class="chips" id="chips">';
   Object.keys(CHAPTERS).forEach(function(c){var n=cw[c]||0;html+='<button class="chip" data-c="'+c+'"'+(n?"":' disabled style="opacity:.4"')+'>H'+c+' · '+esc(CHAPTERS[c])+(n?' ('+n+')':' (—)')+'</button>';});
   html+='</div><div class="row" style="margin-top:18px"><button class="btn" id="start" disabled>Start oefenen →</button><span class="sub" id="cnt" style="margin:0"></span></div>';
   setHTML(html);
   document.getElementById("bk").onclick=function(){state.view="home";render();};
   function refresh(){var chs=Object.keys(sel).filter(function(k){return sel[k];}).map(Number);var pool=SOCIO_DATA.filter(function(q){return chs.indexOf(q.c)>=0;});document.getElementById("cnt").textContent=pool.length?pool.length+" vragen":"";document.getElementById("start").disabled=!pool.length;return pool;}
   Array.prototype.forEach.call(document.querySelectorAll("#chips .chip"),function(b){if(b.disabled)return;b.onclick=function(){var c=+b.dataset.c;sel[c]=!sel[c];b.classList.toggle("on");refresh();};});
   document.getElementById("start").onclick=function(){var p=refresh();startQuiz(shuffle(p),"Hoofdstukken",false);};
 }
 function summary(){
   var html='<button class="backlink" id="bk">← Terug</button><h1>Samenvatting</h1><p class="sub">Beknopte concepten per hoofdstuk.</p>';
   SUMMARY.forEach(function(s){html+='<div class="card pad sumsec"><h3>'+esc(s.h)+'</h3><ul>'+s.p.map(function(p){return '<li>'+p+'</li>';}).join("")+'</ul></div>';});
   html+='<p class="sub" style="margin-top:14px">Korte opfrissing per hoofdstuk (H1–H16). Oefen de vragen voor meer diepgang. 💪</p>';
   setHTML(html);
   document.getElementById("bk").onclick=function(){state.view="home";render();};
 }
 function prep(q){var opts=shuffle(q.o.map(function(o,i){return {t:o[0],k:o[1]};}));return {q:q,opts:opts,picked:[],done:false};}
 function startQuiz(pool,label,timed){
   if(!pool.length)return;
   state.quiz={label:label,timed:!!timed,items:pool.map(prep),idx:0,score:0,wrongList:[]};
   if(timed){var secs=pool.length*40;state.quiz.dur=secs;state.quiz.left=secs;}
   state.view="quiz";render();window.scrollTo(0,0);
 }
 function fmt(s){s=Math.max(0,s|0);var m=Math.floor(s/60);return m+":"+("0"+(s%60)).slice(-2);}
 function runQuiz(){
   var Q=state.quiz;if(Q.done)return result();
   var cur=Q.items[Q.idx],q=cur.q;
   var instr=(q.sel==="foute"?"Selecteer de "+(q.pick>1?q.pick+" ":"")+"FOUTE antwoord"+(q.pick>1?"en":""):"Selecteer "+(q.pick>1?"de "+q.pick+" juiste antwoorden":"het juiste antwoord"));
   var timer=Q.timed?'<span class="simtimer'+(Q.left<=30?" low":"")+'" id="tmr">'+fmt(Q.left)+'</span>':'<span class="qmeta">'+(Q.idx+1)+'/'+Q.items.length+'</span>';
   var html='<button class="backlink" id="bk">← Stoppen</button>'+
     '<div class="runtop"><span class="pill">'+esc(Q.label)+'</span><div class="bar"><i style="width:'+pct(Q.idx,Q.items.length)+'%"></i></div>'+timer+'</div>'+
     '<div class="card pad fadein"><div class="qmeta">Hoofdstuk '+q.c+' · '+esc(CHAPTERS[q.c]||"")+'</div>'+
     '<div class="qinstr">'+instr+'</div><div class="qtext">'+esc(q.q)+'</div><div id="opts">';
   cur.opts.forEach(function(o,i){html+='<button class="opt'+(cur.picked.indexOf(i)>=0?" sel":"")+'" data-i="'+i+'"><span class="bx">'+(cur.picked.indexOf(i)>=0?CHK:"")+'</span><span>'+esc(o.t)+'</span></button>';});
   html+='</div><div id="fb"></div>'+
     (q.note?'<div class="note">⚠️ '+esc(q.note)+'</div>':'')+
     '<div class="row" style="justify-content:flex-end;margin-top:6px"><button class="btn" id="act" disabled>Controleer</button></div></div>';
   setHTML(html);
   document.getElementById("bk").onclick=function(){state.quiz=null;state.view="home";render();};
   var optBtns=Array.prototype.slice.call(document.querySelectorAll("#opts .opt"));
   var act=document.getElementById("act");
   function refresh(){act.disabled=cur.picked.length!==q.pick;act.textContent=(Q.idx+1>=Q.items.length?"Inleveren":"Controleer");if(cur.done)act.textContent=(Q.idx+1>=Q.items.length?"Bekijk resultaat":"Volgende →");}
   optBtns.forEach(function(b){b.onclick=function(){if(cur.done)return;var i=+b.dataset.i;var p=cur.picked.indexOf(i);if(p>=0)cur.picked.splice(p,1);else{if(cur.picked.length>=q.pick)return;cur.picked.push(i);}b.classList.toggle("sel");b.querySelector(".bx").innerHTML=cur.picked.indexOf(i)>=0?CHK:"";refresh();};});
   refresh();
   act.onclick=function(){
     if(!cur.done){
       cur.done=true;
       var allCorrect=true;
       optBtns.forEach(function(b){var i=+b.dataset.i,o=cur.opts[i];b.disabled=true;b.classList.remove("sel");
         var sel=cur.picked.indexOf(i)>=0;
         if(o.k){b.classList.add("correct");b.querySelector(".bx").innerHTML=CHK;if(!sel)allCorrect=false;}
         else if(sel){b.classList.add("wrong");b.querySelector(".bx").innerHTML=XIC;allCorrect=false;}
       });
       if(!Q.timed){var fb=document.getElementById("fb");fb.className="fb "+(allCorrect?"ok":"no");fb.textContent=allCorrect?"Juist! ✓":"Niet helemaal — de juiste staan in het groen.";}
       if(allCorrect)Q.score++; else Q.wrongList.push(q);
       refresh();act.focus();
     } else {
       Q.idx++;if(Q.idx>=Q.items.length){Q.done=true;}render();window.scrollTo(0,0);
     }
   };
   if(Q.timed){if(state.timer)clearInterval(state.timer);state.timer=setInterval(function(){Q.left--;var t=document.getElementById("tmr");if(t){t.textContent=fmt(Q.left);if(Q.left<=30)t.classList.add("low");}if(Q.left<=0){clearInterval(state.timer);state.timer=null;Q.done=true;render();}},1000);}
 }
 function ring(p){var r=54,c=2*Math.PI*r,off=c*(1-p/100);var col=p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)";return '<svg class="ring" viewBox="0 0 128 128"><circle cx="64" cy="64" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="11"/><circle cx="64" cy="64" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="11" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 64 64)"/><text x="64" y="73" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+p+'%</text></svg>';}
 function result(){
   var Q=state.quiz;var p=pct(Q.score,Q.items.length);
   var msg=p>=80?"Sterk! Je staat er goed voor 🎉":p>=60?"Goed bezig 👍":"Blijf oefenen 💪";
   var html='<div class="card pad results fadein"><span class="pill">'+esc(Q.label)+'</span>'+ring(p)+
     '<p style="font-weight:700;font-size:17px;margin:6px 0 2px">'+msg+'</p>'+
     '<p class="sub">'+Q.score+' van '+Q.items.length+' vragen volledig juist'+(Q.timed?' · tijd: '+fmt(Q.dur-Q.left):'')+'</p>'+
     '<div class="row" style="justify-content:center;margin-top:10px">'+
       (Q.wrongList.length?'<button class="btn" id="again">Herhaal '+Q.wrongList.length+' foute</button>':'')+
       '<button class="btn ghost" id="home">Naar start</button></div></div>';
   if(Q.timed){html+='<div class="seclabel">Overzicht</div>';Q.items.forEach(function(it,i){var q=it.q;var ok=Q.wrongList.indexOf(q)<0;var keys=q.o.filter(function(o){return o[1];}).map(function(o){return o[0];});html+='<div class="rev '+(ok?"ok":"no")+'"><div class="rq">'+(i+1)+'. '+esc(q.q)+'</div><div class="ra">'+(q.sel==="foute"?"Aan te duiden (fout): ":"Juist: ")+esc(keys.join(" · "))+'</div></div>';});}
   setHTML(html);
   var ag=document.getElementById("again");if(ag)ag.onclick=function(){startQuiz(shuffle(Q.wrongList),"Foute vragen",false);};
   document.getElementById("home").onclick=function(){state.quiz=null;state.view="home";render();};
 }
 render();
 // splash
 setTimeout(function(){var s=document.getElementById("splash");if(s){s.classList.add("hide");setTimeout(function(){s.remove();},700);}}, (window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)?200:1400);
})();
</script>

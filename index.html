         else if(sel){b.classList.add("wrong");b.querySelector(".bx").innerHTML=XIC;allCorrect=false;}
       });
       if(!Q.timed){var fb=document.getElementById("fb");fb.className="fb "+(allCorrect?"ok":"no");fb.textContent=allCorrect?T("Juist! ✓","Correct! ✓"):T("Niet helemaal — de juiste staan in het groen.","Not quite — the correct ones are in green.");}
       if(allCorrect)Q.score++; else Q.wrong.push(idx);
       refresh();act.focus();
     } else { Q.idx++;if(Q.idx>=Q.items.length){Q.done=true;}render();window.scrollTo(0,0); }
   };
   if(Q.timed){if(state.timer)clearInterval(state.timer);state.timer=setInterval(function(){Q.left--;var t=document.getElementById("tmr");if(t){t.textContent=fmt(Q.left);if(Q.left<=30)t.classList.add("low");}if(Q.left<=0){clearInterval(state.timer);state.timer=null;Q.done=true;render();}},1000);}
 }
 function ring(p){var r=54,c=2*Math.PI*r,off=c*(1-p/100);var col=p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)";return '<svg class="ring" viewBox="0 0 128 128"><circle cx="64" cy="64" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="11"/><circle cx="64" cy="64" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="11" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 64 64)"/><text x="64" y="73" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">'+p+'%</text></svg>';}
 function result(){
   var Q=state.quiz;var p=pct(Q.score,Q.items.length);
   var msg=p>=80?T("Sterk! Je staat er goed voor 🎉","Strong! You're in good shape 🎉"):p>=60?T("Goed bezig 👍","Nice work 👍"):T("Blijf oefenen 💪","Keep practising 💪");
   var html='<div class="card pad results fadein"><span class="pill">'+esc(Q.label)+'</span>'+ring(p)+
     '<p style="font-weight:700;font-size:17px;margin:6px 0 2px">'+msg+'</p>'+
     '<p class="sub">'+Q.score+' '+T("van","of")+' '+Q.items.length+' '+T("vragen volledig juist","questions fully correct")+(Q.timed?' · '+T("tijd","time")+': '+fmt(Q.dur-Q.left):'')+'</p>'+
     '<div class="row" style="justify-content:center;margin-top:10px">'+
       (Q.wrong.length?'<button class="btn" id="again">'+T("Herhaal","Repeat")+' '+Q.wrong.length+' '+T("foute","wrong")+'</button>':'')+
       '<button class="btn ghost" id="homeb">'+T("Naar start","To start")+'</button></div></div>';
   if(Q.timed){html+='<div class="seclabel">'+T("Overzicht","Review")+'</div>';Q.items.forEach(function(it,i){var idx=it.idx;var d=SOCIO_DATA[idx];var ok=Q.wrong.indexOf(idx)<0;var keys=[];d.o.forEach(function(o,oi){if(o[1])keys.push(optText(idx,oi));});html+='<div class="rev '+(ok?"ok":"no")+'"><div class="rq">'+(i+1)+'. '+esc(qText(idx))+'</div><div class="ra">'+(d.sel==="foute"?T("Aan te duiden (fout): ","To select (incorrect): "):T("Juist: ","Correct: "))+esc(keys.join(" · "))+'</div></div>';});}
   setHTML(html);
   var ag=document.getElementById("again");if(ag)ag.onclick=function(){startQuiz(shuffle(Q.wrong.slice()),T("Foute vragen","Wrong questions"),false);};
   document.getElementById("homeb").onclick=function(){go("home");};
 }
 function hacks(){
   var html='<div class="fadein"><h1>'+T("Studie-hacks","Study hacks")+'</h1><p class="sub">'+T("Slimme tips om sociologie sneller onder de knie te krijgen.","Smart tips to master sociology faster.")+'</p>';
   HACKS.forEach(function(h,i){html+='<div class="hack"><span class="hn">'+(i+1)+'</span><div><b>'+esc(T(h.t.nl,h.t.en))+'</b><small>'+T(h.d.nl,h.d.en)+'</small></div></div>';});
   html+='</div>';
   setHTML(html);
 }
 function summary(){
   var arr=(lang==="en"&&typeof SUMMARY_EN!=="undefined"&&SUMMARY_EN&&SUMMARY_EN.length===SUMMARY.length)?SUMMARY_EN:SUMMARY;
   var html='<div class="fadein"><h1>'+T("Samenvatting","Summary")+'</h1><p class="sub">'+T("Beknopte concepten per hoofdstuk.","Concise concepts per chapter.")+'</p>';
   arr.forEach(function(s){html+='<div class="card pad sumsec"><h3>'+esc(s.h)+'</h3><ul>'+s.p.map(function(p){return '<li>'+p+'</li>';}).join("")+'</ul></div>';});
   html+='<p class="sub" style="margin-top:14px">'+T("Korte opfrissing per hoofdstuk (H1–H16). Oefen de vragen voor meer diepgang. 💪","A quick refresher per chapter (H1–H16). Practise the questions for more depth. 💪")+'</p></div>';
   setHTML(html);
 }
 function feedback(){
   var html='<div class="fadein"><h1>'+T("Feedback","Feedback")+'</h1>'+
     '<p class="sub">'+T("Klopt er iets niet of heb je een tip? Laat het weten — het komt bij Berat terecht.","Something wrong or have a tip? Let us know — it goes straight to Berat.")+'</p>'+
     '<label class="flabel">'+T("Je naam (optioneel)","Your name (optional)")+'</label><input class="finput" id="fbName" type="text" placeholder="'+T("mag ook anoniem","anonymous is fine")+'">'+
     '<label class="flabel">'+T("Over welke vraag of hoofdstuk? (optioneel)","Which question or chapter? (optional)")+'</label><input class="finput" id="fbWhere" type="text" placeholder="'+T("bv. H8 of een vraag","e.g. H8 or a question")+'">'+
     '<label class="flabel">'+T("Je bericht","Your message")+' *</label><textarea class="finput" id="fbMsg" placeholder="'+T("Schrijf hier je feedback of fout die je vond","Write your feedback or the mistake you found")+'"></textarea>'+
     '<label class="flabel">'+T("Je e-mail (optioneel, voor antwoord)","Your email (optional, for a reply)")+'</label><input class="finput" id="fbEmail" type="email" placeholder="naam@voorbeeld.com">'+
     '<div class="row" style="margin-top:14px"><button class="btn" id="fbSend">'+T("Versturen","Send")+'</button></div>'+
     '<div id="fbStatus"></div></div>';
   setHTML(html);
   document.getElementById("fbSend").onclick=sendFeedback;
 }
 function sendFeedback(){
   var name=(document.getElementById("fbName").value||"").trim();
   var where=(document.getElementById("fbWhere").value||"").trim();
   var msg=(document.getElementById("fbMsg").value||"").trim();
   var email=(document.getElementById("fbEmail").value||"").trim();
   var st=document.getElementById("fbStatus");st.innerHTML="";
   if(!msg){st.innerHTML='<div class="ferr">'+T("Schrijf eerst een bericht.","Please write a message first.")+'</div>';return;}
   var btn=document.getElementById("fbSend");btn.disabled=true;btn.innerHTML='<span class="spin"></span>'+T("Versturen...","Sending...");
   var payload={_subject:"Berie's exam space - Sociologie feedback",_template:"table",_captcha:"false",Naam:name||"(anoniem)",Over:where||"-",Bericht:msg,email:email||"-"};
   if(email)payload._replyto=email;
   fetch("https://formsubmit.co/ajax/Berat007yildirim@gmail.com",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(payload)})
    .then(function(r){return r.json();})
    .then(function(d){ if(d&&(d.success===true||d.success==="true")){fbThanks();}else{fbFallback(name,where,msg,email);} })
    .catch(function(){fbFallback(name,where,msg,email);});
 }
 function fbThanks(){
   setHTML('<div class="card pad results fadein"><div style="font-size:40px">🙌</div><h2 style="font-family:Georgia,serif">'+T("Bedankt voor je feedback!","Thanks for your feedback!")+'</h2><p class="sub">'+T("We kijken het na. Veel succes met je examen! 💪","We\'ll look into it. Good luck with your exam! 💪")+'</p><div class="row" style="justify-content:center;margin-top:8px"><button class="btn ghost" id="fbBack">'+T("Terug naar start","Back to start")+'</button></div></div>');
   document.getElementById("fbBack").onclick=function(){go("home");};
 }
 function fbFallback(name,where,msg,email){
   var body=T("Feedback Sociologie","Sociology feedback")+"%0D%0A"+T("Naam","Name")+": "+encodeURIComponent(name||"-")+"%0D%0A"+T("Over","About")+": "+encodeURIComponent(where||"-")+"%0D%0AE-mail: "+encodeURIComponent(email||"-")+"%0D%0A%0D%0A"+encodeURIComponent(msg);
   var mailto="mailto:berat007yildirim@gmail.com?subject="+encodeURIComponent("Berie's exam space - Sociologie feedback")+"&body="+body;
   var btn=document.getElementById("fbSend");if(btn){btn.disabled=false;btn.innerHTML=T("Versturen","Send");}
   document.getElementById("fbStatus").innerHTML='<div class="ferr">'+T("Versturen lukte niet. Klik hier om het te mailen: ","Couldn\'t send. Click here to email it: ")+'<a href="'+mailto+'" style="text-decoration:underline;font-weight:700">'+T("mail je feedback","email your feedback")+'</a></div>';
 }

 render();
 setTimeout(function(){var s=document.getElementById("splash");if(s){s.classList.add("hide");setTimeout(function(){s.remove();},700);}}, (window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)?200:1400);
})();

</script>
